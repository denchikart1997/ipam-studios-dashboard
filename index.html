<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Табло студий ИПАМ</title>

  <style>
    :root{
      --bg:#030914;
      --card:rgba(255,255,255,.075);
      --card2:rgba(255,255,255,.04);
      --border:rgba(255,255,255,.12);
      --text:rgba(255,255,255,.94);
      --muted:rgba(255,255,255,.62);
      --muted2:rgba(255,255,255,.42);
      --green:#22c55e;
      --red:#ef4444;
      --yellow:#f59e0b;
      --gray:#94a3b8;
      --blue:#3b82f6;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:24px;
      --ease:cubic-bezier(.22,1,.36,1);
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(1200px 600px at 50% -200px, rgba(15,42,74,.95), transparent 60%),
        radial-gradient(700px 460px at 8% 12%, rgba(59,130,246,.16), transparent 62%),
        radial-gradient(700px 460px at 92% 18%, rgba(34,197,94,.10), transparent 62%),
        linear-gradient(180deg, #061225 0%, #030914 100%);
      background-color:#030914;
    }

    body{
      padding:20px;
      overscroll-behavior-y:none;
    }

    .page{
      width:100%;
      max-width:1320px;
      margin:0 auto;
    }

    .hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      margin-bottom:16px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }

    .logoBox{
      width:250px;
      max-width:42vw;
      padding:10px 16px;
      border-radius:20px;
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.04));
      box-shadow:var(--shadow);
      flex:0 0 auto;
    }

    .logoBox img{
      display:block;
      width:100%;
      height:auto;
    }

    .titleBlock{min-width:0}

    .titleBlock h1{
      margin:0;
      font-size:clamp(30px,4vw,56px);
      line-height:.98;
      font-weight:950;
      letter-spacing:-.045em;
    }

    .titleBlock p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:16px;
      line-height:1.35;
    }

    .clockBox{
      text-align:right;
      padding:14px 18px;
      border-radius:20px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.06);
      min-width:190px;
      box-shadow:0 10px 28px rgba(0,0,0,.18);
    }

    .time{
      font-size:40px;
      font-weight:950;
      line-height:1;
      letter-spacing:-.04em;
    }

    .date{
      margin-top:6px;
      color:var(--muted);
      font-size:15px;
    }

    .headline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:14px;
      padding:14px 16px;
      border-radius:20px;
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,.075), rgba(255,255,255,.035));
      box-shadow:0 12px 34px rgba(0,0,0,.20);
    }

    .headlineMain{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .headlineDot{
      width:12px;
      height:12px;
      border-radius:999px;
      background:var(--green);
      box-shadow:0 0 18px rgba(34,197,94,.55);
      flex:0 0 auto;
    }

    .headlineTitle{
      font-size:22px;
      font-weight:950;
      letter-spacing:-.02em;
      line-height:1.1;
    }

    .headlineSub{
      color:var(--muted);
      font-size:14px;
      margin-top:3px;
    }

    .refreshPill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:36px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
    }

    .refreshSpin{
      width:10px;
      height:10px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.20);
      border-top-color:rgba(255,255,255,.8);
      animation:spin 1.1s linear infinite;
    }

    @keyframes spin{to{transform:rotate(360deg)}}

    .summary{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:12px;
      margin-bottom:18px;
    }

    .summaryCard{
      border:1px solid var(--border);
      background:rgba(255,255,255,.055);
      border-radius:18px;
      padding:14px;
      box-shadow:0 10px 28px rgba(0,0,0,.18);
    }

    .summaryLabel{
      color:var(--muted);
      font-size:13px;
      margin-bottom:4px;
    }

    .summaryValue{
      font-size:30px;
      font-weight:950;
      letter-spacing:-.04em;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,1fr);
      gap:16px;
    }

    .studioCard{
      position:relative;
      min-height:286px;
      border-radius:var(--radius);
      border:1px solid var(--border);
      background:linear-gradient(180deg, var(--card), var(--card2));
      box-shadow:var(--shadow);
      padding:20px;
      overflow:hidden;
      transition:transform .22s var(--ease), border-color .22s var(--ease), background .22s var(--ease);
      transform:translateZ(0);
    }

    .studioCard::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:.18;
      pointer-events:none;
    }

    .studioCard.busy::before{background:radial-gradient(420px 260px at 20% 0%, var(--red), transparent 65%)}
    .studioCard.free::before{background:radial-gradient(420px 260px at 20% 0%, var(--green), transparent 65%)}
    .studioCard.soon::before{background:radial-gradient(420px 260px at 20% 0%, var(--yellow), transparent 65%)}
    .studioCard.nodata::before{background:radial-gradient(420px 260px at 20% 0%, var(--gray), transparent 65%)}

    .studioCard::after{
      content:"";
      position:absolute;
      left:0;
      top:0;
      bottom:0;
      width:5px;
      background:var(--gray);
      opacity:.95;
    }

    .studioCard.busy::after{background:var(--red)}
    .studioCard.free::after{background:var(--green)}
    .studioCard.soon::after{background:var(--yellow)}
    .studioCard.nodata::after{background:var(--gray)}

    .cardTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      position:relative;
      z-index:1;
    }

    .room{
      font-size:36px;
      font-weight:950;
      letter-spacing:-.035em;
      line-height:1;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:850;
      white-space:nowrap;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
    }

    .dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--gray);
      box-shadow:0 0 12px rgba(255,255,255,.25);
      flex:0 0 auto;
    }

    .busy .dot{background:var(--red); box-shadow:0 0 16px rgba(239,68,68,.55)}
    .free .dot{background:var(--green); box-shadow:0 0 16px rgba(34,197,94,.55)}
    .soon .dot{background:var(--yellow); box-shadow:0 0 16px rgba(245,158,11,.55)}

    .mainStatus{
      margin-top:22px;
      position:relative;
      z-index:1;
    }

    .statusText{
      font-size:29px;
      font-weight:950;
      line-height:1.05;
      letter-spacing:-.035em;
    }

    .message{
      margin-top:8px;
      color:var(--muted);
      font-size:15px;
      line-height:1.35;
    }

    .eventBox{
      position:relative;
      z-index:1;
      margin-top:18px;
      padding:14px;
      border-radius:16px;
      background:rgba(0,0,0,.20);
      border:1px solid rgba(255,255,255,.08);
    }

    .eventBox.next{background:rgba(255,255,255,.045)}

    .eventLabel{
      font-size:11px;
      color:#cfe4ff;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:7px;
    }

    .eventTime{
      font-size:14px;
      color:rgba(255,255,255,.82);
      font-weight:850;
      margin-bottom:8px;
    }

    .eventName{
      font-size:17px;
      font-weight:900;
      line-height:1.25;
      word-break:break-word;
    }

    .teacher,.comment{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.35;
      word-break:break-word;
    }

    .commentBadge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      margin-top:10px;
      padding:6px 9px;
      border-radius:999px;
      background:rgba(59,130,246,.12);
      border:1px solid rgba(59,130,246,.22);
      color:#cfe4ff;
      font-size:13px;
      font-weight:800;
    }

    .emptyBox{
      position:relative;
      z-index:1;
      margin-top:18px;
      padding:14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      font-size:14px;
      line-height:1.4;
    }

    .footer{
      margin-top:18px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
      font-size:13px;
    }

    .statusLine{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .smallDot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 12px rgba(34,197,94,.5);
    }

    .error .smallDot{background:var(--red); box-shadow:0 0 12px rgba(239,68,68,.5)}

    .loading{
      grid-column:1/-1;
      padding:30px;
      text-align:center;
      color:var(--muted);
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:rgba(255,255,255,.05);
    }

    @media (hover:hover){
      .studioCard:hover{transform:translateY(-2px)}
    }

    @media (max-width:1100px){
      .grid{grid-template-columns:repeat(2,1fr)}
      .summary{grid-template-columns:repeat(2,1fr)}
    }

    @media (max-width:640px){
      body{padding:12px}
      .hero{flex-direction:column; align-items:stretch}
      .brand{flex-direction:column; align-items:stretch}
      .logoBox{width:100%; max-width:none}
      .clockBox{text-align:left}
      .headline{flex-direction:column; align-items:flex-start}
      .summary{grid-template-columns:repeat(2,1fr)}
      .grid{grid-template-columns:1fr}
      .studioCard{min-height:auto}
      .footer{flex-direction:column}
      .cardTop{align-items:flex-start}
      .room{font-size:34px}
      .statusText{font-size:27px}
    }

    body.tv{padding:26px}
    body.tv .page{max-width:1800px}
    body.tv .summary{display:none}
    body.tv .grid{grid-template-columns:repeat(4,1fr); gap:18px}
    body.tv .studioCard{min-height:330px; padding:22px}
    body.tv .room{font-size:46px}
    body.tv .statusText{font-size:36px}
    body.tv .eventName{font-size:21px}
    body.tv .headlineTitle{font-size:30px}
    body.tv .titleBlock p{display:none}
    body.tv .footer{font-size:15px}

    @media (max-width:1200px){
      body.tv .grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="hero">
      <div class="brand">
        <div class="logoBox">
          <img src="ipam-logo.png" alt="Первая Академия Медиа">
        </div>

        <div class="titleBlock">
          <h1 id="pageTitle">Табло студий</h1>
          <p id="pageSubtitle">Занятость аудиторий и студий в реальном времени</p>
        </div>
      </div>

      <div class="clockBox">
        <div class="time" id="clockTime">--:--</div>
        <div class="date" id="clockDate">--.--.----</div>
      </div>
    </header>

    <section class="headline">
      <div class="headlineMain">
        <span class="headlineDot" id="headlineDot"></span>
        <div>
          <div class="headlineTitle" id="headlineTitle">Загружаем данные...</div>
          <div class="headlineSub" id="headlineSub">Проверяем подключение к расписанию</div>
        </div>
      </div>

      <div class="refreshPill">
        <span class="refreshSpin"></span>
        <span id="refreshText">Обновление через: —</span>
      </div>
    </section>

    <section class="summary">
      <div class="summaryCard">
        <div class="summaryLabel">Свободно</div>
        <div class="summaryValue" id="freeCount">0</div>
      </div>
      <div class="summaryCard">
        <div class="summaryLabel">Занято</div>
        <div class="summaryValue" id="busyCount">0</div>
      </div>
      <div class="summaryCard">
        <div class="summaryLabel">Скоро занято</div>
        <div class="summaryValue" id="soonCount">0</div>
      </div>
      <div class="summaryCard">
        <div class="summaryLabel">Всего студий</div>
        <div class="summaryValue" id="totalCount">0</div>
      </div>
    </section>

    <main id="studiosGrid" class="grid">
      <div class="loading">Загружаем табло студий...</div>
    </main>

    <footer class="footer">
      <div class="statusLine" id="apiStatus">
        <span class="smallDot"></span>
        <span>Подключение к API...</span>
      </div>
      <div id="updatedAt">Последнее обновление: —</div>
    </footer>
  </div>

  <script>
    const BASE_API_URL = "https://script.google.com/macros/s/AKfycbxWe2wpLDw1VBY0tY7N-q28iL275sLONLrVo0qlbV_twDlJhB9NSoPmvZT5vUFs6K-CAA/exec";
    const STUDIOS_API_URL = `${BASE_API_URL}?action=getStudiosStatus`;
    const EVENTS_API_URL = `${BASE_API_URL}?action=getWeeklyEvents`;

    const REFRESH_MS = 30000;
    const STUDIOS_SCREEN_MS = 60000;
    const EVENTS_SCREEN_MS = 60000;

    const params = new URLSearchParams(window.location.search);
    const tvToggle = document.getElementById("tvToggle");
    const screenToggle = document.getElementById("screenToggle");

    const studiosGrid = document.getElementById("studiosGrid");
    const apiStatus = document.getElementById("apiStatus");
    const updatedAtEl = document.getElementById("updatedAt");

    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");

    const freeCountEl = document.getElementById("freeCount");
    const busyCountEl = document.getElementById("busyCount");
    const soonCountEl = document.getElementById("soonCount");
    const totalCountEl = document.getElementById("totalCount");

    let currentView = params.get("view") === "events" ? "events" : "studios";
    let studiosData = null;
    let eventsData = null;
    let rotationTimer = null;

    function setTvMode(enabled, save = true){
      document.body.classList.toggle("tv", enabled);
      tvToggle.classList.toggle("active", enabled);
      tvToggle.textContent = enabled ? "Обычный режим" : "ТВ-режим";
      if (save) localStorage.setItem("ipamTabloTvMode", enabled ? "1" : "0");
      scheduleFit();
    }

    const savedTvMode = localStorage.getItem("ipamTabloTvMode") === "1";
    const urlTvMode = params.get("tv") === "1";
    setTvMode(urlTvMode || savedTvMode, false);

    tvToggle.addEventListener("click", () => {
      setTvMode(!document.body.classList.contains("tv"));
    });

    screenToggle.addEventListener("click", () => {
      setView(currentView === "studios" ? "events" : "studios", true);
    });

    function escapeHtml(str){
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function updateLocalClock(){
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      const mo = String(now.getMonth() + 1).padStart(2, "0");
      const y = now.getFullYear();

      document.getElementById("clockTime").textContent = `${h}:${m}`;
      document.getElementById("clockDate").textContent = `${d}.${mo}.${y}`;
    }

    function timeToMinutes(time){
      const match = String(time || "").match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return null;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function getNowMinutes(){
      const now = new Date();
      return now.getHours() * 60 + now.getMinutes();
    }

    function minutesWord(n){
      const abs = Math.abs(n) % 100;
      const last = abs % 10;
      if (abs >= 11 && abs <= 14) return "минут";
      if (last === 1) return "минута";
      if (last >= 2 && last <= 4) return "минуты";
      return "минут";
    }

    function nextStartsText(next){
      if (!next || !next.start) return "";
      const start = timeToMinutes(next.start);
      if (start === null) return "";
      const diff = start - getNowMinutes();
      if (diff <= 0) return "";
      if (diff < 60) return `Начало через ${diff} ${minutesWord(diff)}`;
      return "";
    }

    function eventHtml(item, label){
      if (!item) return "";

      const teacher = item.teacher ? `<div class="teacher">Преподаватель: ${escapeHtml(item.teacher)}</div>` : "";
      const comment = item.comment ? `<div class="comment">Комментарий: ${escapeHtml(item.comment)}</div>` : "";
      const startsText = label === "Следующее" ? nextStartsText(item) : "";
      const startsHtml = startsText ? `<div class="comment">${escapeHtml(startsText)}</div>` : "";

      return `
        <div class="eventBox">
          <div class="eventTime">${escapeHtml(label)} · ${escapeHtml(item.start)}–${escapeHtml(item.end)}</div>
          <div class="eventName">${escapeHtml(item.event || "Занято")}</div>
          ${teacher}
          ${startsHtml}
          ${comment}
        </div>
      `;
    }

    function nextHtml(next){
      if (!next) return "";
      const startsText = nextStartsText(next);

      return `
        <div class="nextBox">
          <strong>Следующее:</strong><br>
          ${escapeHtml(next.start)}–${escapeHtml(next.end)} · ${escapeHtml(next.event || "Занято")}
          ${next.teacher ? `<br>${escapeHtml(next.teacher)}` : ""}
          ${startsText ? `<br>${escapeHtml(startsText)}` : ""}
          ${next.comment ? `<br>${escapeHtml(next.comment)}` : ""}
        </div>
      `;
    }

    function getDesktopColumns(){
      if (window.innerWidth <= 640) return 1;
      if (window.innerWidth <= 1100) return 2;
      return 4;
    }

    function scheduleFit(){
      window.requestAnimationFrame(fitCardsToViewport);
    }

    function fitCardsToViewport(){
      const isMobile = window.innerWidth <= 640;

      if (isMobile) {
        document.body.classList.remove("fitCompact", "fitUltra");
        document.documentElement.style.removeProperty("--auto-card-height");
        document.documentElement.style.removeProperty("--auto-card-padding");
        document.documentElement.style.removeProperty("--auto-grid-gap");
        return;
      }

      const cardsCount = studiosGrid.querySelectorAll(".dashboardCard").length;
      if (!cardsCount) return;

      const columns = getDesktopColumns();
      const rows = Math.max(1, Math.ceil(cardsCount / columns));

      document.body.classList.remove("fitCompact", "fitUltra");

      const viewportH = window.innerHeight || document.documentElement.clientHeight;
      const gridTop = studiosGrid.getBoundingClientRect().top;
      const footer = document.querySelector(".footer");
      const footerH = footer ? footer.getBoundingClientRect().height : 0;
      const bodyPaddingBottom = parseFloat(getComputedStyle(document.body).paddingBottom) || 0;

      let gap = 18;
      if (document.body.classList.contains("tv")) gap = 20;
      if (viewportH < 820) gap = 14;
      if (viewportH < 740) gap = 12;

      const safeBottom = bodyPaddingBottom + footerH + 18;
      const available = viewportH - gridTop - safeBottom - gap * (rows - 1);
      let cardH = Math.floor(available / rows);

      const maxH = document.body.classList.contains("tv") ? 390 : 370;
      const minH = columns === 4 ? 285 : 320;
      cardH = Math.max(minH, Math.min(maxH, cardH));

      if (cardH < 330) document.body.classList.add("fitCompact");
      if (cardH < 305) document.body.classList.add("fitUltra");

      document.documentElement.style.setProperty("--auto-card-height", `${cardH}px`);
      document.documentElement.style.setProperty("--auto-card-padding", cardH < 305 ? "18px" : cardH < 330 ? "20px" : "24px");
      document.documentElement.style.setProperty("--auto-grid-gap", `${gap}px`);
    }

    function renderStudio(studio){
      const cls = studio.status || "nodata";
      const activeEvent = studio.current ? eventHtml(studio.current, "Сейчас") : "";
      const nextEvent = !studio.current ? eventHtml(studio.next, "Следующее") : nextHtml(studio.next);
      const statusText = studio.statusText || studio.message || "Нет данных";
      const mainMessage = studio.message || statusText;

      return `
        <article class="studioCard dashboardCard ${escapeHtml(cls)}">
          <div class="cardTop">
            <div class="room">${escapeHtml(studio.room || "Студия")}</div>
            <div class="badge">
              <span class="dot"></span>
              ${escapeHtml(statusText)}
            </div>
          </div>

          <div class="mainStatus">
            <div class="statusText">${escapeHtml(mainMessage)}</div>
            <div class="message">${studio.until ? "До " + escapeHtml(studio.until) : ""}</div>
          </div>

          ${activeEvent}
          ${nextEvent}
        </article>
      `;
    }

    function sortStudios(studios){
      const order = { busy: 1, soon: 2, free: 3, nodata: 4 };
      return [...studios].sort((a, b) => {
        const statusA = order[a.status] || 9;
        const statusB = order[b.status] || 9;
        if (statusA !== statusB) return statusA - statusB;
        return String(a.room || "").localeCompare(String(b.room || ""), "ru", { numeric: true });
      });
    }

    function renderStudios(data){
      const studios = Array.isArray(data && data.studios) ? data.studios : [];
      const sorted = sortStudios(studios);

      const free = studios.filter(s => s.status === "free").length;
      const busy = studios.filter(s => s.status === "busy").length;
      const soon = studios.filter(s => s.status === "soon").length;

      pageTitle.textContent = "Табло студий";
      pageSubtitle.textContent = "Занятость аудиторий и студий в реальном времени";

      freeCountEl.textContent = free;
      busyCountEl.textContent = busy;
      soonCountEl.textContent = soon;
      totalCountEl.textContent = studios.length;

      document.querySelectorAll(".summaryLabel")[0].textContent = "Свободно";
      document.querySelectorAll(".summaryLabel")[1].textContent = "Занято";
      document.querySelectorAll(".summaryLabel")[2].textContent = "Скоро заняты";
      document.querySelectorAll(".summaryLabel")[3].textContent = "Всего студий";

      studiosGrid.innerHTML = sorted.length
        ? sorted.map(renderStudio).join("")
        : `<div class="loading">Нет данных по студиям</div>`;

      apiStatus.classList.remove("error");
      apiStatus.querySelector("span:last-child").textContent = "API студий подключён";
      updatedAtEl.textContent = `Последнее обновление: ${escapeHtml(data.currentTime || "—")}`;

      scheduleFit();
      scheduleFitAfterPaint();
    }

    function eventTimeRange(event){
      const start = event.start || "";
      const end = event.end || "";
      if (start && end) return `${start}–${end}`;
      return start || end || "Время уточняется";
    }

    function renderEventItem(event){
      const place = event.place ? `<div class="eventItemPlace">Место: ${escapeHtml(event.place)}</div>` : "";
      const person = event.person ? `<div class="eventItemPerson">Ответственный: ${escapeHtml(event.person)}</div>` : "";
      const comment = event.comment ? `<div class="eventItemComment">${escapeHtml(event.comment)}</div>` : "";

      return `
        <div class="eventItem">
          <div class="eventItemTime">${escapeHtml(eventTimeRange(event))}</div>
          <div class="eventItemTitle">${escapeHtml(event.title || "Мероприятие")}</div>
          ${place}
          ${person}
          ${comment}
        </div>
      `;
    }

    function renderEventDay(day){
      const events = Array.isArray(day.events) ? day.events : [];
      const eventsHtml = events.length
        ? `<div class="eventsList">${events.slice(0, 3).map(renderEventItem).join("")}</div>`
        : `<div class="eventEmpty">Мероприятий на этот день нет</div>`;

      const more = events.length > 3
        ? `<div class="eventEmpty">Еще мероприятий: ${events.length - 3}</div>`
        : "";

      return `
        <article class="studioCard dashboardCard eventDayCard">
          <div class="cardTop">
            <div>
              <div class="room">${escapeHtml(day.label || day.weekday || "День")}</div>
              <div class="dayMeta">${escapeHtml(day.date || "")}</div>
            </div>
            <div class="badge">
              <span class="dot"></span>
              ${events.length ? `${events.length} событ.` : "Пусто"}
            </div>
          </div>

          <div class="dayStatus">
            <div class="dayTitle">${escapeHtml(day.weekday || day.label || "День")}</div>
            <div class="daySubtitle">${events.length ? "Расписание мероприятий" : "Свободный день"}</div>
          </div>

          ${eventsHtml}
          ${more}
        </article>
      `;
    }

    function renderEvents(data){
      const days = Array.isArray(data && data.days) ? data.days : [];
      const totalEvents = days.reduce((sum, day) => sum + (Array.isArray(day.events) ? day.events.length : 0), 0);
      const activeDays = days.filter(day => Array.isArray(day.events) && day.events.length).length;
      const todayEvents = days[0] && Array.isArray(days[0].events) ? days[0].events.length : 0;

      pageTitle.textContent = data.title || "Мероприятия недели";
      pageSubtitle.textContent = "Ближайшие события, занятия и мероприятия на 7 дней";

      document.querySelectorAll(".summaryLabel")[0].textContent = "Дней в афише";
      document.querySelectorAll(".summaryLabel")[1].textContent = "Всего событий";
      document.querySelectorAll(".summaryLabel")[2].textContent = "Сегодня";
      document.querySelectorAll(".summaryLabel")[3].textContent = "Дней с событиями";

      freeCountEl.textContent = days.length;
      busyCountEl.textContent = totalEvents;
      soonCountEl.textContent = todayEvents;
      totalCountEl.textContent = activeDays;

      studiosGrid.innerHTML = days.length
        ? days.map(renderEventDay).join("")
        : `<div class="loading">Мероприятия не найдены</div>`;

      apiStatus.classList.remove("error");
      apiStatus.querySelector("span:last-child").textContent = "API мероприятий подключён";
      updatedAtEl.textContent = `Последнее обновление: ${escapeHtml(data.currentTime || "—")}`;

      scheduleFit();
      scheduleFitAfterPaint();
    }

    function setView(view, manual = false){
      currentView = view === "events" ? "events" : "studios";
      document.body.classList.toggle("eventsView", currentView === "events");
      screenToggle.classList.toggle("active", currentView === "events");
      screenToggle.textContent = currentView === "events" ? "Студии" : "Мероприятия";

      if (currentView === "events") {
        if (eventsData) renderEvents(eventsData);
        else {
          pageTitle.textContent = "Мероприятия недели";
          pageSubtitle.textContent = "Загружаем события из таблицы";
          studiosGrid.innerHTML = `<div class="loading">Загружаем мероприятия...</div>`;
          loadEvents();
        }
      } else {
        if (studiosData) renderStudios(studiosData);
        else {
          pageTitle.textContent = "Табло студий";
          pageSubtitle.textContent = "Загружаем занятость аудиторий";
          studiosGrid.innerHTML = `<div class="loading">Загружаем табло студий...</div>`;
          loadStudios();
        }
      }

      if (manual) restartRotation();
    }

    function scheduleFitAfterPaint(){
      setTimeout(scheduleFit, 80);
      setTimeout(scheduleFit, 250);
      setTimeout(scheduleFit, 700);
    }

    async function loadStudios(){
      try{
        const res = await fetch(STUDIOS_API_URL, { cache: "no-store" });
        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.message || "Ошибка API студий");
        }

        studiosData = data;
        if (currentView === "studios") renderStudios(data);
      } catch(err){
        if (currentView === "studios") {
          apiStatus.classList.add("error");
          apiStatus.querySelector("span:last-child").textContent = "Ошибка подключения API студий";
          updatedAtEl.textContent = err.message || "Ошибка загрузки";
        }
      }
    }

    async function loadEvents(){
      try{
        const res = await fetch(EVENTS_API_URL, { cache: "no-store" });
        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.message || "Ошибка API мероприятий");
        }

        eventsData = data;
        if (currentView === "events") renderEvents(data);
      } catch(err){
        if (currentView === "events") {
          apiStatus.classList.add("error");
          apiStatus.querySelector("span:last-child").textContent = "Ошибка подключения API мероприятий";
          updatedAtEl.textContent = err.message || "Ошибка загрузки";
        }
      }
    }

    function loadAllData(){
      loadStudios();
      loadEvents();
    }

    function restartRotation(){
      if (rotationTimer) clearTimeout(rotationTimer);

      const delay = currentView === "studios" ? STUDIOS_SCREEN_MS : EVENTS_SCREEN_MS;
      rotationTimer = setTimeout(() => {
        setView(currentView === "studios" ? "events" : "studios", false);
        restartRotation();
      }, delay);
    }

    updateLocalClock();
    setInterval(updateLocalClock, 1000);

    loadAllData();
    setView(currentView, false);
    restartRotation();

    window.addEventListener("resize", scheduleFit);
    window.addEventListener("orientationchange", scheduleFit);
    window.addEventListener("load", scheduleFitAfterPaint);

    const logoImg = document.querySelector(".logoBox img");
    if (logoImg) {
      logoImg.addEventListener("load", scheduleFitAfterPaint);
      logoImg.addEventListener("error", scheduleFitAfterPaint);
    }

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(scheduleFitAfterPaint);
    }

    setInterval(loadAllData, REFRESH_MS);
  </script>
</body>
</html>
