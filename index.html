<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Табло студий ИПАМ</title>

  <style>
    :root{
      --bg:#030914;
      --card:rgba(255,255,255,.07);
      --card2:rgba(255,255,255,.04);
      --border:rgba(255,255,255,.12);
      --text:rgba(255,255,255,.94);
      --muted:rgba(255,255,255,.62);
      --green:#22c55e;
      --red:#ef4444;
      --yellow:#f59e0b;
      --gray:#94a3b8;
      --blue:#3b82f6;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:24px;
      --auto-card-height:360px;
      --auto-card-padding:24px;
      --auto-grid-gap:18px;
    }

    *{box-sizing:border-box}

    html{
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      text-rendering:geometricPrecision;
    }

    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
      color:var(--text);
      background:#030914;
      overflow-x:hidden;
    }

    body{
      position:relative;
      isolation:isolate;
      min-height:100dvh;
      padding:22px;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-1;
      pointer-events:none;
      background:
        radial-gradient(1200px 650px at 50% -180px, rgba(22,52,92,.96), transparent 62%),
        radial-gradient(900px 520px at 7% 14%, rgba(59,130,246,.13), transparent 66%),
        radial-gradient(900px 520px at 94% 18%, rgba(34,197,94,.08), transparent 66%),
        radial-gradient(1200px 520px at 50% 112%, rgba(15,42,74,.22), transparent 66%),
        linear-gradient(180deg, #061225 0%, #030914 58%, #020712 100%);
      background-attachment:fixed;
    }

    .page{
      width:100%;
      max-width:1460px;
      margin:0 auto;
      position:relative;
      transition:
        opacity .34s ease,
        transform .34s ease,
        filter .34s ease;
      will-change:opacity, transform, filter;
    }

    body.screenSwitchOut .page{
      opacity:0;
      transform:translateY(10px) scale(.992);
      filter:blur(2px);
    }

    body.screenSwitchIn .page{
      animation:screenReveal .58s cubic-bezier(.22,1,.36,1) both;
    }

    body::after{
      content:"";
      position:fixed;
      inset:-18%;
      z-index:45;
      pointer-events:none;
      opacity:0;
      background:
        linear-gradient(
          110deg,
          transparent 32%,
          rgba(255,255,255,.04) 40%,
          rgba(255,255,255,.24) 48%,
          rgba(59,130,246,.15) 53%,
          transparent 64%
        );
      transform:translateX(-130%) skewX(-12deg);
    }

    body.screenShine::after{
      animation:shinePass .9s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes screenReveal{
      0%{
        opacity:0;
        transform:translateY(10px) scale(.992);
        filter:blur(2px);
      }
      100%{
        opacity:1;
        transform:translateY(0) scale(1);
        filter:blur(0);
      }
    }

    @keyframes shinePass{
      0%{
        opacity:0;
        transform:translateX(-130%) skewX(-12deg);
      }
      18%{opacity:.55}
      58%{opacity:.38}
      100%{
        opacity:0;
        transform:translateX(130%) skewX(-12deg);
      }
    }

    @media (prefers-reduced-motion:reduce){
      .page{transition:none}
      body.screenSwitchIn .page{animation:none}
      body.screenShine::after{animation:none}
    }

    .hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      margin-bottom:20px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }

    .logoBox{
      width:260px;
      max-width:42vw;
      min-height:78px;
      padding:10px 16px;
      border-radius:20px;
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.04));
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
    }

    .logoBox img{
      display:block;
      width:100%;
      height:auto;
      max-height:70px;
      object-fit:contain;
    }

    .logoFallback{
      display:none;
      font-size:22px;
      font-weight:760;
      letter-spacing:-.01em;
      line-height:1.12;
    }

    .logoBox.logoError img{display:none}
    .logoBox.logoError .logoFallback{display:block}

    .titleBlock{min-width:0}

    .titleBlock h1{
      margin:0;
      font-size:clamp(28px,4vw,52px);
      line-height:1;
      font-weight:820;
      letter-spacing:-.006em;
    }

    .titleBlock p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:16px;
      line-height:1.35;
    }

    .clockBox{
      text-align:right;
      padding:18px 24px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.15);
      background:
        linear-gradient(180deg, rgba(255,255,255,.105), rgba(255,255,255,.045));
      min-width:230px;
      flex:0 0 auto;
      box-shadow:0 18px 44px rgba(0,0,0,.26);
    }

    .time{
      font-size:clamp(48px,5vw,74px);
      font-weight:760;
      line-height:.92;
      letter-spacing:-.008em;
      font-variant-numeric:tabular-nums;
    }

    .date{
      margin-top:10px;
      color:var(--muted);
      font-size:16px;
      letter-spacing:.01em;
    }

    .summary{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
      margin-bottom:18px;
    }

    .summaryCard{
      border:1px solid var(--border);
      background:rgba(255,255,255,.055);
      border-radius:18px;
      padding:16px;
      box-shadow:0 10px 28px rgba(0,0,0,.18);
      min-width:0;
    }

    .summaryLabel{
      color:var(--muted);
      font-size:13px;
      margin-bottom:4px;
    }

    .summaryValue{
      font-size:28px;
      font-weight:760;
      line-height:1;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      grid-auto-rows:var(--auto-card-height);
      align-items:stretch;
      gap:var(--auto-grid-gap);
    }

    .studioCard{
      position:relative;
      height:100%;
      min-height:0;
      border-radius:var(--radius);
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,.078), rgba(255,255,255,.038));
      box-shadow:var(--shadow);
      padding:var(--auto-card-padding);
      overflow:hidden;
      min-width:0;
      display:flex;
      flex-direction:column;
    }

    /*
      На больших экранах карточка фиксированная по высоте.
      Поэтому длинные названия/комментарии не растягивают всю сетку,
      а аккуратно обрезаются внутри карточки. На телефоне ниже возвращаем auto.
    */
    .clamp1,
    .badge,
    .eventTime{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .clamp2,
    .statusText,
    .eventName{
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .clamp3,
    .teacher,
    .comment,
    .nextBox{
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .studioCard::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:.18;
      pointer-events:none;
    }

    .studioCard.busy::before{background:radial-gradient(520px 320px at 18% 0%, var(--red), transparent 65%)}
    .studioCard.free::before{background:radial-gradient(520px 320px at 18% 0%, var(--green), transparent 65%)}
    .studioCard.soon::before{background:radial-gradient(520px 320px at 18% 0%, var(--yellow), transparent 65%)}
    .studioCard.nodata::before{background:radial-gradient(520px 320px at 18% 0%, var(--gray), transparent 65%)}

    .cardTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      position:relative;
      z-index:1;
      min-width:0;
    }

    .room{
      font-size:38px;
      font-weight:800;
      letter-spacing:-.006em;
      line-height:1;
      min-width:0;
      word-break:break-word;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:760;
      white-space:nowrap;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      flex:0 0 auto;
    }

    .dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--gray);
      box-shadow:0 0 12px rgba(255,255,255,.25);
      flex:0 0 auto;
    }

    .busy .dot{background:var(--red); box-shadow:0 0 16px rgba(239,68,68,.55)}
    .free .dot{background:var(--green); box-shadow:0 0 16px rgba(34,197,94,.55)}
    .soon .dot{background:var(--yellow); box-shadow:0 0 16px rgba(245,158,11,.55)}

    .mainStatus{
      margin-top:24px;
      position:relative;
      z-index:1;
      flex:0 0 auto;
    }

    .statusText{
      font-size:30px;
      font-weight:800;
      line-height:1.05;
      letter-spacing:-.006em;
      word-break:break-word;
    }

    .message{
      margin-top:8px;
      color:var(--muted);
      font-size:16px;
      line-height:1.35;
      min-height:22px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .eventBox{
      position:relative;
      z-index:1;
      margin-top:18px;
      padding:16px;
      border-radius:16px;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.08);
      min-height:0;
      flex:0 0 auto;
    }

    .eventTime{
      font-size:13px;
      color:#cfe4ff;
      font-weight:760;
      margin-bottom:8px;
    }

    .eventName{
      font-size:18px;
      font-weight:760;
      line-height:1.25;
      word-break:break-word;
    }

    .teacher,
    .comment{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.35;
      word-break:break-word;
      -webkit-line-clamp:2;
    }

    .nextBox{
      position:relative;
      z-index:1;
      margin-top:auto;
      padding-top:12px;
      border-top:1px solid rgba(255,255,255,.10);
      color:var(--muted);
      font-size:12.5px;
      line-height:1.28;
      word-break:break-word;
      -webkit-line-clamp:3;
      flex:0 0 auto;
    }

    .nextBox strong{
      color:rgba(255,255,255,.9);
      font-size:13px;
    }

    .nextCompactLine{
      color:rgba(255,255,255,.72);
    }

    .footer{
      margin-top:20px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
      font-size:13px;
    }

    .statusLine{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .smallDot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 12px rgba(34,197,94,.5);
      flex:0 0 auto;
    }

    .error .smallDot{background:var(--red); box-shadow:0 0 12px rgba(239,68,68,.5)}

    .loading{
      grid-column:1/-1;
      padding:30px;
      text-align:center;
      color:var(--muted);
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:rgba(255,255,255,.05);
    }

    .viewControls{
      position:fixed;
      top:14px;
      right:14px;
      z-index:50;
      display:flex;
      gap:8px;
      opacity:.38;
      transition:opacity .18s ease;
    }

    .viewControls:hover{opacity:1}

    .viewBtn{
      appearance:none;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(3,9,20,.62);
      color:rgba(255,255,255,.82);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:760;
      cursor:pointer;
    }

    .viewBtn.active{
      color:#fff;
      border-color:rgba(59,130,246,.45);
      background:rgba(59,130,246,.20);
    }



    body.fitCompact .titleBlock h1{font-size:clamp(28px,3.5vw,46px)}
    body.fitCompact .titleBlock p{font-size:14px; margin-top:6px}
    body.fitCompact .logoBox{width:240px; min-height:68px}
    body.fitCompact .clockBox{padding:14px 20px; min-width:210px}
    body.fitCompact .time{font-size:clamp(46px,4.2vw,62px)}
    body.fitCompact .date{margin-top:6px; font-size:14px}
    body.fitCompact .summaryCard{padding:12px 14px}
    body.fitCompact .summaryValue{font-size:24px}
    body.fitCompact .room{font-size:34px}
    body.fitCompact .statusText{font-size:26px}
    body.fitCompact .mainStatus{margin-top:16px}
    body.fitCompact .message{margin-top:5px; min-height:18px; font-size:14px}
    body.fitCompact .eventBox{margin-top:10px; padding:12px}
    body.fitCompact .eventName{font-size:16px}
    body.fitCompact .eventTime{margin-bottom:6px}
    body.fitCompact .teacher,
    body.fitCompact .comment{margin-top:5px; font-size:13px; -webkit-line-clamp:1}
    body.fitCompact .nextBox{padding-top:8px; font-size:12px; line-height:1.24; -webkit-line-clamp:3}
    body.fitCompact .footer{margin-top:12px}

    body.fitUltra .titleBlock p{display:none}
    body.fitUltra .logoBox{width:220px; min-height:62px}
    body.fitUltra .clockBox{padding:12px 18px; min-width:190px}
    body.fitUltra .time{font-size:52px}
    body.fitUltra .date{font-size:13px}
    body.fitUltra .summary{gap:10px; margin-bottom:10px}
    body.fitUltra .summaryCard{padding:10px 12px}
    body.fitUltra .summaryLabel{font-size:12px}
    body.fitUltra .summaryValue{font-size:22px}
    body.fitUltra .room{font-size:31px}
    body.fitUltra .badge{min-height:30px; font-size:12px; padding:0 10px}
    body.fitUltra .statusText{font-size:23px}
    body.fitUltra .mainStatus{margin-top:12px}
    body.fitUltra .message{font-size:13px; min-height:16px}
    body.fitUltra .eventBox{margin-top:8px; padding:10px}
    body.fitUltra .eventTime{font-size:12px}
    body.fitUltra .eventName{font-size:15px; -webkit-line-clamp:2}
    body.fitUltra .teacher,
    body.fitUltra .comment{display:none}
    body.fitUltra .nextBox{padding-top:7px; font-size:11.5px; line-height:1.2; -webkit-line-clamp:2}
    body.fitUltra .footer{margin-top:8px; font-size:12px}



    .eventDayCard::before{
      background:radial-gradient(520px 320px at 18% 0%, var(--blue), transparent 65%) !important;
      opacity:.16;
    }

    .eventDayCard.empty::before{
      background:radial-gradient(520px 320px at 18% 0%, var(--gray), transparent 65%) !important;
      opacity:.13;
    }

    .eventDayCard .dot{background:var(--blue); box-shadow:0 0 16px rgba(59,130,246,.55)}
    .eventDayCard.empty .dot{background:var(--gray); box-shadow:0 0 12px rgba(148,163,184,.35)}

    .eventDayCard .room{
      letter-spacing:-.012em;
      line-height:.98;
    }

    .dayDate{
      color:var(--muted);
      font-size:15px;
      margin-top:7px;
      line-height:1.2;
      font-weight:620;
      letter-spacing:.005em;
    }

    .eventList{
      position:relative;
      z-index:1;
      margin-top:18px;
      display:flex;
      flex-direction:column;
      gap:10px;
      min-height:0;
      overflow:hidden;
    }

    .weekEvent{
      padding:12px 14px;
      border-radius:15px;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.08);
      min-width:0;
    }

    .weekEventTime{
      font-size:13px;
      color:#cfe4ff;
      font-weight:760;
      margin-bottom:6px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .weekEventTitle{
      font-size:17px;
      font-weight:780;
      line-height:1.22;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      word-break:break-word;
    }

    .weekEventMeta{
      margin-top:7px;
      color:var(--muted);
      font-size:13px;
      line-height:1.3;
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
      word-break:break-word;
    }

    .emptyDayText{
      position:relative;
      z-index:1;
      margin-top:18px;
      padding:14px;
      border-radius:16px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.08);
      color:var(--muted);
      font-size:15px;
      line-height:1.35;
    }

    body.fitCompact .eventList{margin-top:10px; gap:8px}
    body.fitCompact .weekEvent{padding:10px 12px}
    body.fitCompact .weekEventTitle{font-size:15px}
    body.fitCompact .weekEventMeta{font-size:12px; -webkit-line-clamp:1}

    body.fitUltra .eventList{margin-top:8px; gap:7px}
    body.fitUltra .weekEvent{padding:9px 10px}
    body.fitUltra .weekEventTime{font-size:12px}
    body.fitUltra .weekEventTitle{font-size:14px; -webkit-line-clamp:2}
    body.fitUltra .weekEventMeta{display:none}

    @media (max-width:1100px){
      .grid{grid-template-columns:repeat(2,minmax(0,1fr)); grid-auto-rows:auto}
      .summary{grid-template-columns:repeat(2,minmax(0,1fr))}
      .studioCard{height:auto; min-height:320px}
    }

    @media (max-width:640px){
      body{padding:12px}
      .page{max-width:none}
      .viewControls{
        position:static;
        justify-content:flex-end;
        margin:0 0 10px;
        opacity:.75;
      }
      .hero{
        flex-direction:column;
        align-items:stretch;
        margin-bottom:16px;
      }
      .brand{
        flex-direction:column;
        align-items:stretch;
      }
      .logoBox{
        width:100%;
        max-width:none;
      }
      .clockBox{
        text-align:left;
        width:100%;
        min-width:0;
        padding:16px 18px;
      }
      .time{font-size:52px}
      .grid{grid-template-columns:1fr; grid-auto-rows:auto}
      .summary{grid-template-columns:repeat(2,minmax(0,1fr))}
      .studioCard{
        height:auto;
        min-height:auto;
        padding:20px;
      }
      .statusText,
      .eventName,
      .teacher,
      .comment,
      .nextBox{
        display:block;
        overflow:visible;
        -webkit-line-clamp:unset;
      }
      .eventTime,
      .weekEventTime,
      .message{
        white-space:normal;
      }
      .weekEventTitle,
      .weekEventMeta{
        display:block;
        overflow:visible;
        -webkit-line-clamp:unset;
      }
      .footer{flex-direction:column}
      .badge{
        font-size:12px;
        padding:0 10px;
      }
    }

      padding:28px;
    }

      .footer{margin-top:14px}
    }

    @media (min-width:1201px) and (max-height:860px){
      body.tv{padding:18px}
      body.tv .page{max-width:1500px}
      body.tv .hero{margin-bottom:12px}
      body.tv .summary{margin-bottom:12px}
      body.tv .studioCard{height:100%; min-height:0; padding:var(--auto-card-padding)}
      body.tv .room{font-size:40px}
      body.tv .statusText{font-size:30px}
      body.tv .eventName{font-size:18px}
      body.tv .clockBox{padding:16px 24px}
      body.tv .time{font-size:68px}
    }

    @media (max-width:1200px){
      body.tv .grid{grid-template-columns:repeat(2,minmax(0,1fr)); grid-auto-rows:auto}
      body.tv .studioCard{height:auto; min-height:320px}
    }
  </style>
</head>

<body>
  <div class="viewControls" aria-label="Переключение режима отображения">
    <button class="viewBtn" id="tvToggle" type="button">ТВ-режим</button>
    <button class="viewBtn" id="screenToggle" type="button">Мероприятия</button>
  </div>

  <div class="page">
    <header class="hero">
      <div class="brand">
        <div class="logoBox" id="logoBox">
          <img src="ipam-logo.png" alt="Первая Академия Медиа" onerror="document.getElementById('logoBox').classList.add('logoError')">
          <div class="logoFallback">Первая Академия Медиа</div>
        </div>

        <div class="titleBlock">
          <h1 id="pageTitle">Табло студий</h1>
          <p id="pageSubtitle">Занятость аудиторий и студий в реальном времени</p>
        </div>
      </div>

      <div class="clockBox">
        <div class="time" id="clockTime">--:--</div>
        <div class="date" id="clockDate">--.--.----</div>
      </div>
    </header>

    <section class="summary">
      <div class="summaryCard">
        <div class="summaryLabel">Свободно</div>
        <div class="summaryValue" id="freeCount">0</div>
      </div>
      <div class="summaryCard">
        <div class="summaryLabel">Занято</div>
        <div class="summaryValue" id="busyCount">0</div>
      </div>
      <div class="summaryCard">
        <div class="summaryLabel">Скоро заняты</div>
        <div class="summaryValue" id="soonCount">0</div>
      </div>
      <div class="summaryCard">
        <div class="summaryLabel">Всего студий</div>
        <div class="summaryValue" id="totalCount">0</div>
      </div>
    </section>

    <main id="studiosGrid" class="grid">
      <div class="loading">Загружаем табло студий...</div>
    </main>

    <footer class="footer">
      <div class="statusLine" id="apiStatus">
        <span class="smallDot"></span>
        <span>Подключение к API...</span>
      </div>
      <div id="updatedAt">Последнее обновление: —</div>
    </footer>
  </div>

  <script>
    const BASE_API_URL = "https://script.google.com/macros/s/AKfycbxWe2wpLDw1VBY0tY7N-q28iL275sLONLrVo0qlbV_twDlJhB9NSoPmvZT5vUFs6K-CAA/exec";
    const STUDIOS_API_URL = `${BASE_API_URL}?action=getStudiosStatus`;
    const EVENTS_API_URL = `${BASE_API_URL}?action=getWeeklyEvents`;

    const REFRESH_MS = 30000;
    const STUDIOS_SCREEN_MS = 60000;
    const EVENTS_SCREEN_MS = 60000;

    const params = new URLSearchParams(window.location.search);
    const tvToggle = document.getElementById("tvToggle");
    const screenToggle = document.getElementById("screenToggle");

    const studiosGrid = document.getElementById("studiosGrid");
    const apiStatus = document.getElementById("apiStatus");
    const updatedAtEl = document.getElementById("updatedAt");
    const pageTitle = document.getElementById("pageTitle");
    const pageSubtitle = document.getElementById("pageSubtitle");

    let currentView = params.get("view") === "events" ? "events" : "studios";
    let studiosData = null;
    let eventsData = null;
    let rotationTimer = null;
    let fitTimer = null;
    let viewTransitionBusy = false;

    function safeLocalStorageGet(key){
      try { return localStorage.getItem(key); } catch(e) { return null; }
    }

    function safeLocalStorageSet(key, value){
      try { localStorage.setItem(key, value); } catch(e) {}
    }

    function setTvMode(enabled, save = true){
      document.body.classList.toggle("tv", enabled);
      if (tvToggle) {
        tvToggle.classList.toggle("active", enabled);
        tvToggle.textContent = enabled ? "Обычный режим" : "ТВ-режим";
      }
      if (save) safeLocalStorageSet("ipamTabloTvMode", enabled ? "1" : "0");
      scheduleFitStable();
    }

    const savedTvMode = safeLocalStorageGet("ipamTabloTvMode") === "1";
    const urlTvMode = params.get("tv") === "1";
    setTvMode(urlTvMode || savedTvMode, false);

    if (tvToggle) {
      tvToggle.addEventListener("click", () => {
        setTvMode(!document.body.classList.contains("tv"));
      });
    }

    if (screenToggle) {
      screenToggle.addEventListener("click", () => {
        setView(currentView === "studios" ? "events" : "studios", true);
      });
    }

    function escapeHtml(str){
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function updateLocalClock(){
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      const mo = String(now.getMonth() + 1).padStart(2, "0");
      const y = now.getFullYear();

      document.getElementById("clockTime").textContent = `${h}:${m}`;
      document.getElementById("clockDate").textContent = `${d}.${mo}.${y}`;
    }

    function timeToMinutes(time){
      const match = String(time || "").match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return null;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function getNowMinutes(){
      const now = new Date();
      return now.getHours() * 60 + now.getMinutes();
    }

    function minutesWord(n){
      const abs = Math.abs(n) % 100;
      const last = abs % 10;
      if (abs >= 11 && abs <= 14) return "минут";
      if (last === 1) return "минута";
      if (last >= 2 && last <= 4) return "минуты";
      return "минут";
    }

    function nextStartsText(next){
      if (!next || !next.start) return "";
      const start = timeToMinutes(next.start);
      if (start === null) return "";
      const diff = start - getNowMinutes();
      if (diff <= 0) return "";
      if (diff < 60) return `Начало через ${diff} ${minutesWord(diff)}`;
      return "";
    }

    function eventHtml(item, label){
      if (!item) return "";

      const teacher = item.teacher ? `<div class="teacher">Преподаватель: ${escapeHtml(item.teacher)}</div>` : "";
      const comment = item.comment ? `<div class="comment">Комментарий: ${escapeHtml(item.comment)}</div>` : "";
      const startsText = label === "Следующее" ? nextStartsText(item) : "";
      const startsHtml = startsText ? `<div class="comment">${escapeHtml(startsText)}</div>` : "";

      return `
        <div class="eventBox">
          <div class="eventTime">${escapeHtml(label)} · ${escapeHtml(item.start)}–${escapeHtml(item.end)}</div>
          <div class="eventName">${escapeHtml(item.event || "Занято")}</div>
          ${teacher}
          ${startsHtml}
          ${comment}
        </div>
      `;
    }

    function nextHtml(next){
      if (!next) return "";
      const startsText = nextStartsText(next);

      return `
        <div class="nextBox">
          <strong>Следующее:</strong><br>
          <span class="nextCompactLine">${escapeHtml(next.start)}–${escapeHtml(next.end)} · ${escapeHtml(next.event || "Занято")}</span>
          ${startsText ? `<br><span class="nextCompactLine">${escapeHtml(startsText)}</span>` : ""}
        </div>
      `;
    }

    function getDesktopColumns(){
      if (window.innerWidth <= 640) return 1;
      if (window.innerWidth <= 1100) return 2;
      return 4;
    }

    function scheduleFitStable(){
      clearTimeout(fitTimer);
      window.requestAnimationFrame(fitCardsToViewport);
      fitTimer = setTimeout(fitCardsToViewport, 80);
    }

    function fitCardsToViewport(){
      const isMobile = window.innerWidth <= 640;

      if (isMobile) {
        document.body.classList.remove("fitCompact", "fitUltra");
        document.documentElement.style.removeProperty("--auto-card-height");
        document.documentElement.style.removeProperty("--auto-card-padding");
        document.documentElement.style.removeProperty("--auto-grid-gap");
        return;
      }

      const cardsCount = studiosGrid.querySelectorAll(".studioCard").length;
      if (!cardsCount) return;

      const columns = getDesktopColumns();
      const rows = Math.max(1, Math.ceil(cardsCount / columns));

      document.body.classList.remove("fitCompact", "fitUltra");

      const viewportH = window.innerHeight || document.documentElement.clientHeight;
      const gridTop = studiosGrid.getBoundingClientRect().top;
      const footer = document.querySelector(".footer");
      const footerH = footer ? footer.getBoundingClientRect().height : 0;
      const bodyPaddingBottom = parseFloat(getComputedStyle(document.body).paddingBottom) || 0;

      let gap = 18;
      if (document.body.classList.contains("tv")) gap = 20;
      if (viewportH < 820) gap = 14;
      if (viewportH < 740) gap = 12;

      const safeBottom = bodyPaddingBottom + footerH + 18;
      const available = viewportH - gridTop - safeBottom - gap * (rows - 1);
      let cardH = Math.floor(available / rows);

      const maxH = document.body.classList.contains("tv") ? 390 : 370;
      const minH = columns === 4 ? 285 : 320;
      cardH = Math.max(minH, Math.min(maxH, cardH));

      if (cardH < 330) document.body.classList.add("fitCompact");
      if (cardH < 305) document.body.classList.add("fitUltra");

      document.documentElement.style.setProperty("--auto-card-height", `${cardH}px`);
      document.documentElement.style.setProperty("--auto-card-padding", cardH < 305 ? "18px" : cardH < 330 ? "20px" : "24px");
      document.documentElement.style.setProperty("--auto-grid-gap", `${gap}px`);
    }

    function renderStudio(studio){
      const cls = studio.status || "nodata";
      const activeEvent = studio.current ? eventHtml(studio.current, "Сейчас") : "";
      const nextEvent = !studio.current ? eventHtml(studio.next, "Следующее") : nextHtml(studio.next);
      const statusText = studio.statusText || studio.message || "Нет данных";
      const mainMessage = studio.message || statusText;

      return `
        <article class="studioCard ${escapeHtml(cls)}">
          <div class="cardTop">
            <div class="room">${escapeHtml(studio.room || "Студия")}</div>
            <div class="badge">
              <span class="dot"></span>
              ${escapeHtml(statusText)}
            </div>
          </div>

          <div class="mainStatus">
            <div class="statusText">${escapeHtml(mainMessage)}</div>
            <div class="message">${studio.until ? "До " + escapeHtml(studio.until) : ""}</div>
          </div>

          ${activeEvent}
          ${nextEvent}
        </article>
      `;
    }

    function sortStudios(studios){
      const order = { busy: 1, soon: 2, free: 3, nodata: 4 };
      return [...studios].sort((a, b) => {
        const statusA = order[a.status] || 9;
        const statusB = order[b.status] || 9;
        if (statusA !== statusB) return statusA - statusB;
        return String(a.room || "").localeCompare(String(b.room || ""), "ru", { numeric: true });
      });
    }

    function setSummaryCards(items){
      const cards = document.querySelectorAll(".summaryCard");
      cards.forEach((card, i) => {
        const label = card.querySelector(".summaryLabel");
        const value = card.querySelector(".summaryValue");
        if (label) label.textContent = items[i] ? items[i].label : "—";
        if (value) value.textContent = items[i] ? items[i].value : "0";
      });
    }

    function renderStudios(data){
      const studios = Array.isArray(data && data.studios) ? data.studios : [];
      const sorted = sortStudios(studios);

      const free = studios.filter(s => s.status === "free").length;
      const busy = studios.filter(s => s.status === "busy").length;
      const soon = studios.filter(s => s.status === "soon").length;

      pageTitle.textContent = "Табло студий";
      pageSubtitle.textContent = "Занятость аудиторий и студий в реальном времени";

      setSummaryCards([
        { label: "Свободно", value: free },
        { label: "Занято", value: busy },
        { label: "Скоро заняты", value: soon },
        { label: "Всего студий", value: studios.length }
      ]);

      studiosGrid.innerHTML = sorted.length
        ? sorted.map(renderStudio).join("")
        : `<div class="loading">Нет данных по студиям</div>`;

      apiStatus.classList.remove("error");
      apiStatus.querySelector("span:last-child").textContent = "API подключён";
      updatedAtEl.textContent = `Последнее обновление: ${escapeHtml(data && data.currentTime || "—")}`;
      scheduleFitStable();
    }

    function eventCountForDay(day){
      return Array.isArray(day && day.events) ? day.events.length : 0;
    }

    function parseRuDateString(dateStr){
      const m = String(dateStr || "").trim().match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if (!m) return null;
      return new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
    }

    function formatShortWeekday(weekday){
      const map = {
        "Понедельник": "ПН",
        "Вторник": "ВТ",
        "Среда": "СР",
        "Четверг": "ЧТ",
        "Пятница": "ПТ",
        "Суббота": "СБ",
        "Воскресенье": "ВС"
      };
      return map[String(weekday || "").trim()] || String(weekday || "").trim();
    }

    function getMonthGenitiveRu(monthIndex){
      const months = [
        "января", "февраля", "марта", "апреля", "мая", "июня",
        "июля", "августа", "сентября", "октября", "ноября", "декабря"
      ];
      return months[monthIndex] || "";
    }

    function formatEventDayTitle(day){
      const label = String(day && day.label || "").trim();
      if (label === "Сегодня" || label === "Завтра") return label;
      return formatShortWeekday(day && day.weekday || label || "День");
    }

    function formatEventDaySubTitle(day){
      const label = String(day && day.label || "").trim();
      const dateObj = parseRuDateString(day && day.date);
      if (!dateObj) return String(day && day.date || "");

      if (label === "Сегодня" || label === "Завтра") {
        const dd = String(dateObj.getDate()).padStart(2, "0");
        const mm = String(dateObj.getMonth() + 1).padStart(2, "0");
        return `${dd}.${mm}.${dateObj.getFullYear()}`;
      }

      return `${dateObj.getDate()} ${getMonthGenitiveRu(dateObj.getMonth())}`;
    }

    function renderWeekEvent(event){
      const time = `${escapeHtml(event.start || "—")}–${escapeHtml(event.end || "—")}`;
      const place = event.place ? `Место: ${escapeHtml(event.place)}` : "";
      const person = event.person ? `Ответственный: ${escapeHtml(event.person)}` : "";
      const comment = event.comment ? `Комментарий: ${escapeHtml(event.comment)}` : "";
      const meta = [place, person, comment].filter(Boolean).join(" · ");

      return `
        <div class="weekEvent">
          <div class="weekEventTime">${time}</div>
          <div class="weekEventTitle">${escapeHtml(event.title || "Мероприятие")}</div>
          ${meta ? `<div class="weekEventMeta">${meta}</div>` : ""}
        </div>
      `;
    }

    function renderEventDay(day){
      const events = Array.isArray(day.events) ? day.events : [];
      const hasEvents = events.length > 0;
      const badgeText = hasEvents ? `${events.length} ${events.length === 1 ? "событие" : "событий"}` : "Нет событий";
      const title = formatEventDayTitle(day);
      const subTitle = formatEventDaySubTitle(day);

      return `
        <article class="studioCard eventDayCard ${hasEvents ? "" : "empty"}">
          <div class="cardTop">
            <div>
              <div class="room">${escapeHtml(title || "День")}</div>
              ${subTitle ? `<div class="dayDate">${escapeHtml(subTitle)}</div>` : ""}
            </div>
            <div class="badge">
              <span class="dot"></span>
              ${escapeHtml(badgeText)}
            </div>
          </div>

          ${hasEvents
            ? `<div class="eventList">${events.map(renderWeekEvent).join("")}</div>`
            : `<div class="emptyDayText">На этот день мероприятий нет</div>`
          }
        </article>
      `;
    }

    function renderEvents(data){
      const days = Array.isArray(data && data.days) ? data.days : [];
      const totalEvents = days.reduce((sum, day) => sum + eventCountForDay(day), 0);
      const todayEvents = eventCountForDay(days[0]);
      const tomorrowEvents = eventCountForDay(days[1]);
      const daysWithEvents = days.filter(day => eventCountForDay(day) > 0).length;

      pageTitle.textContent = (data && data.title) || "Мероприятия недели";
      pageSubtitle.textContent = "Ближайшие события и активности на 8 дней";

      setSummaryCards([
        { label: "Сегодня", value: todayEvents },
        { label: "Завтра", value: tomorrowEvents },
        { label: "Дней с событиями", value: daysWithEvents },
        { label: "Всего событий", value: totalEvents }
      ]);

      studiosGrid.innerHTML = days.length
        ? days.map(renderEventDay).join("")
        : `<div class="loading">Нет данных по мероприятиям</div>`;

      if (data && data.ok === false) {
        apiStatus.classList.add("error");
        apiStatus.querySelector("span:last-child").textContent = "Ошибка API мероприятий";
        updatedAtEl.textContent = escapeHtml(data.message || "Ошибка загрузки мероприятий");
      } else {
        apiStatus.classList.remove("error");
        apiStatus.querySelector("span:last-child").textContent = "API подключён";
        updatedAtEl.textContent = `Последнее обновление: ${escapeHtml(data && data.currentTime || "—")}`;
      }

      scheduleFitStable();
    }

    function renderCurrentView(){
      if (currentView === "events") {
        renderEvents(eventsData || { ok:true, title:"Мероприятия недели", days:[] });
      } else {
        renderStudios(studiosData || { ok:true, currentTime:"—", studios:[] });
      }
    }

    function scheduleRotation(){
      clearTimeout(rotationTimer);
      const delay = currentView === "studios" ? STUDIOS_SCREEN_MS : EVENTS_SCREEN_MS;
      rotationTimer = setTimeout(() => {
        setView(currentView === "studios" ? "events" : "studios", false);
      }, delay);
    }

    function applyView(view){
      currentView = view === "events" ? "events" : "studios";
      document.body.classList.toggle("eventsView", currentView === "events");

      if (screenToggle) {
        screenToggle.classList.toggle("active", currentView === "events");
        screenToggle.textContent = currentView === "events" ? "Студии" : "Мероприятия";
      }

      renderCurrentView();
    }

    function setView(view, manual = false, instant = false){
      const nextView = view === "events" ? "events" : "studios";

      if (viewTransitionBusy) return;

      clearTimeout(rotationTimer);

      if (instant) {
        applyView(nextView);
        scheduleRotation();
        return;
      }

      if (nextView === currentView && manual) {
        scheduleRotation();
        return;
      }

      viewTransitionBusy = true;
      document.body.classList.remove("screenSwitchIn");
      document.body.classList.add("screenSwitchOut", "screenShine");

      window.setTimeout(() => {
        applyView(nextView);

        document.body.classList.remove("screenSwitchOut");
        document.body.classList.add("screenSwitchIn");

        window.setTimeout(() => {
          document.body.classList.remove("screenSwitchIn", "screenShine");
          viewTransitionBusy = false;
          scheduleRotation();
        }, 680);
      }, 260);
    }

    async function loadStudiosData(){
      const res = await fetch(STUDIOS_API_URL, { cache: "no-store" });
      const data = await res.json();
      if (!data.ok) throw new Error(data.message || "Ошибка API студий");
      studiosData = data;
      if (currentView === "studios") renderStudios(data);
      return data;
    }

    async function loadEventsData(){
      try {
        const res = await fetch(EVENTS_API_URL, { cache: "no-store" });
        const data = await res.json();
        eventsData = data;
        if (currentView === "events") renderEvents(data);
        return data;
      } catch(err) {
        eventsData = {
          ok: false,
          title: "Мероприятия недели",
          currentTime: "—",
          days: [],
          message: err.message || "Ошибка загрузки мероприятий"
        };
        if (currentView === "events") renderEvents(eventsData);
        return eventsData;
      }
    }

    async function loadAllData(){
      const results = await Promise.allSettled([loadStudiosData(), loadEventsData()]);
      const studiosResult = results[0];

      if (studiosResult.status === "rejected" && currentView === "studios") {
        apiStatus.classList.add("error");
        apiStatus.querySelector("span:last-child").textContent = "Ошибка подключения API";
        updatedAtEl.textContent = studiosResult.reason && studiosResult.reason.message ? studiosResult.reason.message : "Ошибка загрузки";
      }
    }

    updateLocalClock();
    setInterval(updateLocalClock, 1000);

    setView(currentView, false, true);
    loadAllData();

    window.addEventListener("resize", scheduleFitStable);
    window.addEventListener("orientationchange", scheduleFitStable);
    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(scheduleFitStable);
    }

    setTimeout(scheduleFitStable, 80);
    setTimeout(scheduleFitStable, 250);
    setTimeout(scheduleFitStable, 700);

    setInterval(loadAllData, REFRESH_MS);
  </script>
</body>
</html>
