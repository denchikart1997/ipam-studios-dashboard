<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Табло студий ИПАМ</title>

  <style>
    :root{
      --bg:#030914;
      --card:rgba(255,255,255,.07);
      --card2:rgba(255,255,255,.04);
      --border:rgba(255,255,255,.12);
      --text:rgba(255,255,255,.94);
      --muted:rgba(255,255,255,.62);
      --green:#22c55e;
      --red:#ef4444;
      --yellow:#f59e0b;
      --gray:#94a3b8;
      --blue:#3b82f6;
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:24px;
    }

    *{box-sizing:border-box}

    html{
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      text-rendering:geometricPrecision;
    }

    html,body{
      margin:0;
      min-height:100%;
      font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
      color:var(--text);
      background:#030914;
      overflow-x:hidden;
    }

    body{
      position:relative;
      isolation:isolate;
      min-height:100dvh;
      padding:22px;
      overflow-y:auto;
      -webkit-overflow-scrolling:touch;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-1;
      pointer-events:none;
      background:
        radial-gradient(1200px 650px at 50% -180px, rgba(22,52,92,.96), transparent 62%),
        radial-gradient(900px 520px at 7% 14%, rgba(59,130,246,.13), transparent 66%),
        radial-gradient(900px 520px at 94% 18%, rgba(34,197,94,.08), transparent 66%),
        radial-gradient(1200px 520px at 50% 112%, rgba(15,42,74,.22), transparent 66%),
        linear-gradient(180deg, #061225 0%, #030914 58%, #020712 100%);
      background-attachment:fixed;
    }

    .page{
      width:100%;
      max-width:1460px;
      margin:0 auto;
    }

    .hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      margin-bottom:20px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }

    .logoBox{
      width:260px;
      max-width:42vw;
      min-height:78px;
      padding:10px 16px;
      border-radius:20px;
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.04));
      box-shadow:var(--shadow);
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
    }

    .logoBox img{
      display:block;
      width:100%;
      height:auto;
      max-height:70px;
      object-fit:contain;
    }

    .logoFallback{
      display:none;
      font-size:22px;
      font-weight:760;
      letter-spacing:-.01em;
      line-height:1.12;
    }

    .logoBox.logoError img{display:none}
    .logoBox.logoError .logoFallback{display:block}

    .titleBlock{min-width:0}

    .titleBlock h1{
      margin:0;
      font-size:clamp(28px,4vw,52px);
      line-height:1;
      font-weight:820;
      letter-spacing:-.006em;
    }

    .titleBlock p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:16px;
      line-height:1.35;
    }

    .clockBox{
      text-align:right;
      padding:18px 24px;
      border-radius:22px;
      border:1px solid rgba(255,255,255,.15);
      background:
        linear-gradient(180deg, rgba(255,255,255,.105), rgba(255,255,255,.045));
      min-width:230px;
      flex:0 0 auto;
      box-shadow:0 18px 44px rgba(0,0,0,.26);
    }

    .time{
      font-size:clamp(48px,5vw,74px);
      font-weight:760;
      line-height:.92;
      letter-spacing:-.008em;
      font-variant-numeric:tabular-nums;
    }

    .date{
      margin-top:10px;
      color:var(--muted);
      font-size:16px;
      letter-spacing:.01em;
    }

    .summary{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
      margin-bottom:18px;
    }

    .summaryCard{
      border:1px solid var(--border);
      background:rgba(255,255,255,.055);
      border-radius:18px;
      padding:16px;
      box-shadow:0 10px 28px rgba(0,0,0,.18);
      min-width:0;
    }

    .summaryLabel{
      color:var(--muted);
      font-size:13px;
      margin-bottom:4px;
    }

    .summaryValue{
      font-size:28px;
      font-weight:760;
      line-height:1;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:18px;
    }

    .studioCard{
      position:relative;
      height:clamp(330px, calc((100dvh - 305px) / 2), 380px);
      min-height:330px;
      border-radius:var(--radius);
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,.078), rgba(255,255,255,.038));
      box-shadow:var(--shadow);
      padding:24px;
      overflow:hidden;
      min-width:0;
      display:flex;
      flex-direction:column;
    }

    /*
      На больших экранах карточка фиксированная по высоте.
      Поэтому длинные названия/комментарии не растягивают всю сетку,
      а аккуратно обрезаются внутри карточки. На телефоне ниже возвращаем auto.
    */
    .clamp1,
    .badge,
    .eventTime{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .clamp2,
    .statusText,
    .eventName{
      display:-webkit-box;
      -webkit-line-clamp:2;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .clamp3,
    .teacher,
    .comment,
    .nextBox{
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
    }

    .studioCard::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:.18;
      pointer-events:none;
    }

    .studioCard.busy::before{background:radial-gradient(520px 320px at 18% 0%, var(--red), transparent 65%)}
    .studioCard.free::before{background:radial-gradient(520px 320px at 18% 0%, var(--green), transparent 65%)}
    .studioCard.soon::before{background:radial-gradient(520px 320px at 18% 0%, var(--yellow), transparent 65%)}
    .studioCard.nodata::before{background:radial-gradient(520px 320px at 18% 0%, var(--gray), transparent 65%)}

    .cardTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      position:relative;
      z-index:1;
      min-width:0;
    }

    .room{
      font-size:38px;
      font-weight:800;
      letter-spacing:-.006em;
      line-height:1;
      min-width:0;
      word-break:break-word;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:760;
      white-space:nowrap;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      flex:0 0 auto;
    }

    .dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--gray);
      box-shadow:0 0 12px rgba(255,255,255,.25);
      flex:0 0 auto;
    }

    .busy .dot{background:var(--red); box-shadow:0 0 16px rgba(239,68,68,.55)}
    .free .dot{background:var(--green); box-shadow:0 0 16px rgba(34,197,94,.55)}
    .soon .dot{background:var(--yellow); box-shadow:0 0 16px rgba(245,158,11,.55)}

    .mainStatus{
      margin-top:24px;
      position:relative;
      z-index:1;
      flex:0 0 auto;
    }

    .statusText{
      font-size:30px;
      font-weight:800;
      line-height:1.05;
      letter-spacing:-.006em;
      word-break:break-word;
    }

    .message{
      margin-top:8px;
      color:var(--muted);
      font-size:16px;
      line-height:1.35;
      min-height:22px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .eventBox{
      position:relative;
      z-index:1;
      margin-top:18px;
      padding:16px;
      border-radius:16px;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.08);
      min-height:0;
      flex:0 0 auto;
    }

    .eventTime{
      font-size:13px;
      color:#cfe4ff;
      font-weight:760;
      margin-bottom:8px;
    }

    .eventName{
      font-size:18px;
      font-weight:760;
      line-height:1.25;
      word-break:break-word;
    }

    .teacher,
    .comment{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.35;
      word-break:break-word;
      -webkit-line-clamp:2;
    }

    .nextBox{
      position:relative;
      z-index:1;
      margin-top:auto;
      padding-top:14px;
      border-top:1px solid rgba(255,255,255,.10);
      color:var(--muted);
      font-size:14px;
      line-height:1.38;
      word-break:break-word;
      -webkit-line-clamp:4;
      flex:0 0 auto;
    }

    .nextBox strong{color:rgba(255,255,255,.9)}

    .footer{
      margin-top:20px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
      font-size:13px;
    }

    .statusLine{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .smallDot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 12px rgba(34,197,94,.5);
      flex:0 0 auto;
    }

    .error .smallDot{background:var(--red); box-shadow:0 0 12px rgba(239,68,68,.5)}

    .loading{
      grid-column:1/-1;
      padding:30px;
      text-align:center;
      color:var(--muted);
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:rgba(255,255,255,.05);
    }

    .viewControls{
      position:fixed;
      top:14px;
      right:14px;
      z-index:50;
      display:flex;
      gap:8px;
      opacity:.38;
      transition:opacity .18s ease;
    }

    .viewControls:hover{opacity:1}

    .viewBtn{
      appearance:none;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(3,9,20,.62);
      color:rgba(255,255,255,.82);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:760;
      cursor:pointer;
    }

    .viewBtn.active{
      color:#fff;
      border-color:rgba(59,130,246,.45);
      background:rgba(59,130,246,.20);
    }

    @media (max-width:1100px){
      .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .summary{grid-template-columns:repeat(2,minmax(0,1fr))}
    }

    @media (max-width:640px){
      body{padding:12px}
      .page{max-width:none}
      .viewControls{
        position:static;
        justify-content:flex-end;
        margin:0 0 10px;
        opacity:.75;
      }
      .hero{
        flex-direction:column;
        align-items:stretch;
        margin-bottom:16px;
      }
      .brand{
        flex-direction:column;
        align-items:stretch;
      }
      .logoBox{
        width:100%;
        max-width:none;
      }
      .clockBox{
        text-align:left;
        width:100%;
        min-width:0;
        padding:16px 18px;
      }
      .time{font-size:52px}
      .grid{grid-template-columns:1fr}
      .summary{grid-template-columns:repeat(2,minmax(0,1fr))}
      .studioCard{
        height:auto;
        min-height:auto;
        padding:20px;
      }
      .statusText,
      .eventName,
      .teacher,
      .comment,
      .nextBox{
        display:block;
        overflow:visible;
        -webkit-line-clamp:unset;
      }
      .eventTime,
      .message{
        white-space:normal;
      }
      .footer{flex-direction:column}
      .badge{
        font-size:12px;
        padding:0 10px;
      }
    }

    body.tv{
      padding:28px;
    }

    body.tv .page{max-width:1840px}
    body.tv .hero{margin-bottom:18px}
    body.tv .grid{grid-template-columns:repeat(4,minmax(0,1fr)); gap:20px}
    body.tv .studioCard{height:clamp(340px, calc((100dvh - 330px) / 2), 400px); min-height:340px; padding:26px}
    body.tv .room{font-size:46px}
    body.tv .statusText{font-size:36px}
    body.tv .eventName{font-size:20px}
    body.tv .summaryValue{font-size:32px}
    body.tv .titleBlock p{display:none}
    body.tv .clockBox{min-width:280px; padding:20px 28px}
    body.tv .time{font-size:78px}
    body.tv .date{font-size:18px}

    @media (min-width:1201px) and (max-height:860px){
      body{padding:16px}
      .page{max-width:1380px}
      .hero{margin-bottom:14px}
      .summary{margin-bottom:14px}
      .studioCard{height:clamp(310px, calc((100dvh - 255px) / 2), 340px); min-height:310px; padding:20px}
      .room{font-size:34px}
      .statusText{font-size:26px}
      .eventName{font-size:16px}
      .mainStatus{margin-top:16px}
      .message{margin-top:5px; min-height:18px}
      .eventBox{margin-top:10px; padding:12px}
      .eventTime{margin-bottom:6px}
      .teacher,.comment{margin-top:5px; -webkit-line-clamp:1}
      .nextBox{margin-top:auto; padding-top:10px; line-height:1.34; -webkit-line-clamp:4}
      .footer{margin-top:14px}
    }

    @media (min-width:1201px) and (max-height:860px){
      body.tv{padding:18px}
      body.tv .page{max-width:1500px}
      body.tv .hero{margin-bottom:12px}
      body.tv .summary{margin-bottom:12px}
      body.tv .studioCard{height:clamp(295px, calc((100dvh - 285px) / 2), 340px); min-height:295px; padding:20px}
      body.tv .room{font-size:40px}
      body.tv .statusText{font-size:30px}
      body.tv .eventName{font-size:18px}
      body.tv .clockBox{padding:16px 24px}
      body.tv .time{font-size:68px}
    }

    @media (max-width:1200px){
      body.tv .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      body.tv .studioCard{height:auto; min-height:320px}
    }
  </style>
</head>

<body>
  <div class="viewControls" aria-label="Переключение режима отображения">
    <button class="viewBtn" id="tvToggle" type="button">ТВ-режим</button>
  </div>

  <div class="page">
    <header class="hero">
      <div class="brand">
        <div class="logoBox" id="logoBox">
          <img src="ipam-logo.png" alt="Первая Академия Медиа" onerror="document.getElementById('logoBox').classList.add('logoError')">
          <div class="logoFallback">Первая Академия Медиа</div>
        </div>

        <div class="titleBlock">
          <h1>Табло студий</h1>
          <p>Занятость аудиторий и студий в реальном времени</p>
        </div>
      </div>

      <div class="clockBox">
        <div class="time" id="clockTime">--:--</div>
        <div class="date" id="clockDate">--.--.----</div>
      </div>
    </header>

    <section class="summary">
      <div class="summaryCard">
        <div class="summaryLabel">Свободно</div>
        <div class="summaryValue" id="freeCount">0</div>
      </div>
      <div class="summaryCard">
        <div class="summaryLabel">Занято</div>
        <div class="summaryValue" id="busyCount">0</div>
      </div>
      <div class="summaryCard">
        <div class="summaryLabel">Скоро заняты</div>
        <div class="summaryValue" id="soonCount">0</div>
      </div>
      <div class="summaryCard">
        <div class="summaryLabel">Всего студий</div>
        <div class="summaryValue" id="totalCount">0</div>
      </div>
    </section>

    <main id="studiosGrid" class="grid">
      <div class="loading">Загружаем табло студий...</div>
    </main>

    <footer class="footer">
      <div class="statusLine" id="apiStatus">
        <span class="smallDot"></span>
        <span>Подключение к API...</span>
      </div>
      <div id="updatedAt">Последнее обновление: —</div>
    </footer>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxWe2wpLDw1VBY0tY7N-q28iL275sLONLrVo0qlbV_twDlJhB9NSoPmvZT5vUFs6K-CAA/exec?action=getStudiosStatus";
    const REFRESH_MS = 30000;

    const params = new URLSearchParams(window.location.search);
    const tvToggle = document.getElementById("tvToggle");

    function setTvMode(enabled, save = true){
      document.body.classList.toggle("tv", enabled);
      tvToggle.classList.toggle("active", enabled);
      tvToggle.textContent = enabled ? "Обычный режим" : "ТВ-режим";
      if (save) localStorage.setItem("ipamTabloTvMode", enabled ? "1" : "0");
    }

    const savedTvMode = localStorage.getItem("ipamTabloTvMode") === "1";
    const urlTvMode = params.get("tv") === "1";
    setTvMode(urlTvMode || savedTvMode, false);

    tvToggle.addEventListener("click", () => {
      setTvMode(!document.body.classList.contains("tv"));
    });

    const studiosGrid = document.getElementById("studiosGrid");
    const apiStatus = document.getElementById("apiStatus");
    const updatedAtEl = document.getElementById("updatedAt");

    const freeCountEl = document.getElementById("freeCount");
    const busyCountEl = document.getElementById("busyCount");
    const soonCountEl = document.getElementById("soonCount");
    const totalCountEl = document.getElementById("totalCount");

    function escapeHtml(str){
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function updateLocalClock(){
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      const mo = String(now.getMonth() + 1).padStart(2, "0");
      const y = now.getFullYear();

      document.getElementById("clockTime").textContent = `${h}:${m}`;
      document.getElementById("clockDate").textContent = `${d}.${mo}.${y}`;
    }

    function timeToMinutes(time){
      const match = String(time || "").match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return null;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function getNowMinutes(){
      const now = new Date();
      return now.getHours() * 60 + now.getMinutes();
    }

    function minutesWord(n){
      const abs = Math.abs(n) % 100;
      const last = abs % 10;
      if (abs >= 11 && abs <= 14) return "минут";
      if (last === 1) return "минута";
      if (last >= 2 && last <= 4) return "минуты";
      return "минут";
    }

    function nextStartsText(next){
      if (!next || !next.start) return "";
      const start = timeToMinutes(next.start);
      if (start === null) return "";
      const diff = start - getNowMinutes();
      if (diff <= 0) return "";
      if (diff < 60) return `Начало через ${diff} ${minutesWord(diff)}`;
      return "";
    }

    function eventHtml(item, label){
      if (!item) return "";

      const teacher = item.teacher ? `<div class="teacher">Преподаватель: ${escapeHtml(item.teacher)}</div>` : "";
      const comment = item.comment ? `<div class="comment">Комментарий: ${escapeHtml(item.comment)}</div>` : "";
      const startsText = label === "Следующее" ? nextStartsText(item) : "";
      const startsHtml = startsText ? `<div class="comment">${escapeHtml(startsText)}</div>` : "";

      return `
        <div class="eventBox">
          <div class="eventTime">${escapeHtml(label)} · ${escapeHtml(item.start)}–${escapeHtml(item.end)}</div>
          <div class="eventName">${escapeHtml(item.event || "Занято")}</div>
          ${teacher}
          ${startsHtml}
          ${comment}
        </div>
      `;
    }

    function nextHtml(next){
      if (!next) return "";
      const startsText = nextStartsText(next);

      return `
        <div class="nextBox">
          <strong>Следующее:</strong><br>
          ${escapeHtml(next.start)}–${escapeHtml(next.end)} · ${escapeHtml(next.event || "Занято")}
          ${next.teacher ? `<br>${escapeHtml(next.teacher)}` : ""}
          ${startsText ? `<br>${escapeHtml(startsText)}` : ""}
          ${next.comment ? `<br>${escapeHtml(next.comment)}` : ""}
        </div>
      `;
    }

    function renderStudio(studio){
      const cls = studio.status || "nodata";
      const activeEvent = studio.current ? eventHtml(studio.current, "Сейчас") : "";
      const nextEvent = !studio.current ? eventHtml(studio.next, "Следующее") : nextHtml(studio.next);
      const statusText = studio.statusText || studio.message || "Нет данных";
      const mainMessage = studio.message || statusText;

      return `
        <article class="studioCard ${escapeHtml(cls)}">
          <div class="cardTop">
            <div class="room">${escapeHtml(studio.room || "Студия")}</div>
            <div class="badge">
              <span class="dot"></span>
              ${escapeHtml(statusText)}
            </div>
          </div>

          <div class="mainStatus">
            <div class="statusText">${escapeHtml(mainMessage)}</div>
            <div class="message">${studio.until ? "До " + escapeHtml(studio.until) : ""}</div>
          </div>

          ${activeEvent}
          ${nextEvent}
        </article>
      `;
    }

    function sortStudios(studios){
      const order = { busy: 1, soon: 2, free: 3, nodata: 4 };
      return [...studios].sort((a, b) => {
        const statusA = order[a.status] || 9;
        const statusB = order[b.status] || 9;
        if (statusA !== statusB) return statusA - statusB;
        return String(a.room || "").localeCompare(String(b.room || ""), "ru", { numeric: true });
      });
    }

    function render(data){
      const studios = Array.isArray(data.studios) ? data.studios : [];
      const sorted = sortStudios(studios);

      const free = studios.filter(s => s.status === "free").length;
      const busy = studios.filter(s => s.status === "busy").length;
      const soon = studios.filter(s => s.status === "soon").length;

      freeCountEl.textContent = free;
      busyCountEl.textContent = busy;
      soonCountEl.textContent = soon;
      totalCountEl.textContent = studios.length;

      studiosGrid.innerHTML = sorted.length
        ? sorted.map(renderStudio).join("")
        : `<div class="loading">Нет данных по студиям</div>`;

      apiStatus.classList.remove("error");
      apiStatus.querySelector("span:last-child").textContent = "API подключён";

      updatedAtEl.textContent = `Последнее обновление: ${escapeHtml(data.currentTime || "—")}`;
    }

    async function loadData(){
      try{
        const res = await fetch(API_URL, { cache: "no-store" });
        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.message || "Ошибка API");
        }

        render(data);
      } catch(err){
        apiStatus.classList.add("error");
        apiStatus.querySelector("span:last-child").textContent = "Ошибка подключения API";
        updatedAtEl.textContent = err.message || "Ошибка загрузки";
      }
    }

    updateLocalClock();
    setInterval(updateLocalClock, 1000);

    loadData();
    setInterval(loadData, REFRESH_MS);
  </script>
</body>
</html>
