<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#030914" />
  <title>Табло студий ИПАМ</title>

  <style>
    :root{
      --bg:#030914;
      --bg2:#07162c;
      --card:rgba(255,255,255,.082);
      --card2:rgba(255,255,255,.042);
      --border:rgba(255,255,255,.13);
      --text:rgba(255,255,255,.95);
      --muted:rgba(255,255,255,.66);
      --muted2:rgba(255,255,255,.45);
      --green:#22c55e;
      --red:#ef4444;
      --yellow:#f59e0b;
      --gray:#94a3b8;
      --blue:#3b82f6;
      --shadow:0 20px 60px rgba(0,0,0,.35);
      --radius:24px;
      --ease:cubic-bezier(.22,1,.36,1);
      --page-max:1480px;
      --gap:16px;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      width:100%;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      color:var(--text);
      background-color:var(--bg);
      overflow-x:hidden;
    }

    body{
      min-height:100svh;
      padding:clamp(12px,1.8vw,26px);
      overscroll-behavior:none;
      background:
        radial-gradient(1200px 680px at 50% -260px, rgba(34,83,145,.48), transparent 64%),
        radial-gradient(860px 560px at 8% 8%, rgba(59,130,246,.18), transparent 62%),
        radial-gradient(860px 560px at 92% 14%, rgba(34,197,94,.12), transparent 62%),
        linear-gradient(180deg, var(--bg2) 0%, var(--bg) 72%);
    }

    .page{
      width:min(100%, var(--page-max));
      min-height:calc(100svh - clamp(24px,3.6vw,52px));
      margin:0 auto;
      display:flex;
      flex-direction:column;
    }

    .hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      margin-bottom:14px;
      flex:0 0 auto;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:16px;
      min-width:0;
    }

    .logoBox{
      width:clamp(170px,18vw,275px);
      min-height:72px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px 16px;
      border-radius:20px;
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.045));
      box-shadow:0 14px 34px rgba(0,0,0,.25);
      flex:0 0 auto;
      overflow:hidden;
    }

    .logoBox img{
      display:block;
      width:100%;
      height:auto;
      max-height:62px;
      object-fit:contain;
    }

    .logoFallback{
      display:none;
      font-weight:950;
      font-size:20px;
      letter-spacing:.02em;
      color:rgba(255,255,255,.88);
      text-align:center;
    }

    .logoBox.noLogo img{display:none}
    .logoBox.noLogo .logoFallback{display:block}

    .titleBlock{min-width:0}

    .titleBlock h1{
      margin:0;
      font-size:clamp(30px,4vw,58px);
      line-height:.96;
      font-weight:950;
      letter-spacing:-.055em;
      text-wrap:balance;
    }

    .titleBlock p{
      margin:8px 0 0;
      color:var(--muted);
      font-size:clamp(14px,1.2vw,17px);
      line-height:1.35;
    }

    .clockBox{
      text-align:right;
      padding:14px 18px;
      border-radius:20px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.064);
      min-width:190px;
      box-shadow:0 10px 28px rgba(0,0,0,.18);
      flex:0 0 auto;
    }

    .time{
      font-size:clamp(36px,3.4vw,54px);
      font-weight:950;
      line-height:1;
      letter-spacing:-.045em;
      font-variant-numeric:tabular-nums;
    }

    .date{
      margin-top:6px;
      color:var(--muted);
      font-size:clamp(14px,1vw,16px);
      white-space:nowrap;
    }

    .headline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:14px;
      padding:14px 16px;
      border-radius:20px;
      border:1px solid var(--border);
      background:linear-gradient(180deg, rgba(255,255,255,.078), rgba(255,255,255,.036));
      box-shadow:0 12px 34px rgba(0,0,0,.20);
      flex:0 0 auto;
    }

    .headlineMain{
      display:flex;
      align-items:center;
      gap:12px;
      min-width:0;
    }

    .headlineDot{
      width:12px;
      height:12px;
      border-radius:999px;
      background:var(--green);
      box-shadow:0 0 18px rgba(34,197,94,.55);
      flex:0 0 auto;
    }

    .headlineTitle{
      font-size:clamp(21px,2vw,30px);
      font-weight:950;
      letter-spacing:-.03em;
      line-height:1.08;
    }

    .headlineSub{
      color:var(--muted);
      font-size:clamp(13px,1vw,15px);
      margin-top:3px;
    }

    .refreshPill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:36px;
      padding:0 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:var(--muted);
      font-size:13px;
      white-space:nowrap;
      flex:0 0 auto;
    }

    .refreshSpin{
      width:10px;
      height:10px;
      border-radius:50%;
      border:2px solid rgba(255,255,255,.20);
      border-top-color:rgba(255,255,255,.82);
      animation:spin 1.1s linear infinite;
    }

    @keyframes spin{to{transform:rotate(360deg)}}

    .summary{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:12px;
      margin-bottom:16px;
      flex:0 0 auto;
    }

    .summaryCard{
      border:1px solid var(--border);
      background:rgba(255,255,255,.055);
      border-radius:18px;
      padding:13px 14px;
      box-shadow:0 10px 28px rgba(0,0,0,.18);
      min-width:0;
    }

    .summaryLabel{
      color:var(--muted);
      font-size:13px;
      margin-bottom:4px;
      white-space:nowrap;
    }

    .summaryValue{
      font-size:clamp(28px,2.4vw,36px);
      font-weight:950;
      letter-spacing:-.045em;
      font-variant-numeric:tabular-nums;
    }

    .grid{
      flex:1 1 auto;
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:var(--gap);
      align-content:start;
    }

    .studioCard{
      position:relative;
      min-height:300px;
      border-radius:var(--radius);
      border:1px solid var(--border);
      background:linear-gradient(180deg, var(--card), var(--card2));
      box-shadow:var(--shadow);
      padding:20px;
      overflow:hidden;
      transition:transform .22s var(--ease), border-color .22s var(--ease), background .22s var(--ease);
      transform:translateZ(0);
      display:flex;
      flex-direction:column;
      isolation:isolate;
    }

    .studioCard::before{
      content:"";
      position:absolute;
      inset:0;
      opacity:.19;
      pointer-events:none;
      z-index:-1;
    }

    .studioCard.busy::before{background:radial-gradient(480px 320px at 18% 0%, var(--red), transparent 65%)}
    .studioCard.free::before{background:radial-gradient(480px 320px at 18% 0%, var(--green), transparent 65%)}
    .studioCard.soon::before{background:radial-gradient(480px 320px at 18% 0%, var(--yellow), transparent 65%)}
    .studioCard.nodata::before{background:radial-gradient(480px 320px at 18% 0%, var(--gray), transparent 65%)}

    .studioCard::after{
      content:"";
      position:absolute;
      left:0;
      top:0;
      bottom:0;
      width:5px;
      background:var(--gray);
      opacity:.95;
    }

    .studioCard.busy::after{background:var(--red)}
    .studioCard.free::after{background:var(--green)}
    .studioCard.soon::after{background:var(--yellow)}
    .studioCard.nodata::after{background:var(--gray)}

    .cardTop{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      position:relative;
      z-index:1;
    }

    .room{
      font-size:clamp(34px,3vw,48px);
      font-weight:950;
      letter-spacing:-.04em;
      line-height:1;
      min-width:0;
      overflow-wrap:anywhere;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      min-height:34px;
      padding:0 12px;
      border-radius:999px;
      font-size:13px;
      font-weight:850;
      white-space:nowrap;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      flex:0 0 auto;
    }

    .dot{
      width:9px;
      height:9px;
      border-radius:50%;
      background:var(--gray);
      box-shadow:0 0 12px rgba(255,255,255,.25);
      flex:0 0 auto;
    }

    .busy .dot{background:var(--red); box-shadow:0 0 16px rgba(239,68,68,.55)}
    .free .dot{background:var(--green); box-shadow:0 0 16px rgba(34,197,94,.55)}
    .soon .dot{background:var(--yellow); box-shadow:0 0 16px rgba(245,158,11,.55)}

    .mainStatus{
      margin-top:20px;
      position:relative;
      z-index:1;
    }

    .statusText{
      font-size:clamp(28px,2.25vw,38px);
      font-weight:950;
      line-height:1.05;
      letter-spacing:-.04em;
      text-wrap:balance;
    }

    .message{
      min-height:20px;
      margin-top:8px;
      color:var(--muted);
      font-size:15px;
      line-height:1.35;
    }

    .events{
      margin-top:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1 1 auto;
    }

    .eventBox{
      position:relative;
      z-index:1;
      padding:14px;
      border-radius:16px;
      background:rgba(0,0,0,.22);
      border:1px solid rgba(255,255,255,.085);
      min-width:0;
    }

    .eventBox.next{background:rgba(255,255,255,.047)}

    .eventLabel{
      font-size:11px;
      color:#cfe4ff;
      font-weight:900;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:7px;
    }

    .eventTime{
      font-size:14px;
      color:rgba(255,255,255,.84);
      font-weight:850;
      margin-bottom:8px;
      font-variant-numeric:tabular-nums;
    }

    .eventName{
      font-size:clamp(17px,1.45vw,22px);
      font-weight:900;
      line-height:1.22;
      overflow-wrap:anywhere;
    }

    .teacher,.comment{
      margin-top:8px;
      color:var(--muted);
      font-size:14px;
      line-height:1.35;
      overflow-wrap:anywhere;
    }

    .commentBadge{
      display:inline-flex;
      align-items:center;
      gap:6px;
      margin-top:10px;
      padding:6px 9px;
      border-radius:999px;
      background:rgba(59,130,246,.12);
      border:1px solid rgba(59,130,246,.22);
      color:#cfe4ff;
      font-size:13px;
      font-weight:800;
      max-width:100%;
      overflow-wrap:anywhere;
    }

    .emptyBox{
      position:relative;
      z-index:1;
      padding:14px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);
      color:var(--muted);
      font-size:14px;
      line-height:1.4;
    }

    .footer{
      margin-top:16px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
      font-size:13px;
      flex:0 0 auto;
    }

    .statusLine{
      display:flex;
      align-items:center;
      gap:8px;
    }

    .smallDot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:var(--green);
      box-shadow:0 0 12px rgba(34,197,94,.5);
      flex:0 0 auto;
    }

    .error .smallDot{background:var(--red); box-shadow:0 0 12px rgba(239,68,68,.5)}

    .loading{
      grid-column:1/-1;
      padding:30px;
      text-align:center;
      color:var(--muted);
      border:1px solid var(--border);
      border-radius:var(--radius);
      background:rgba(255,255,255,.05);
    }

    @media (hover:hover){
      .studioCard:hover{transform:translateY(-2px)}
    }

    @media (max-width:1180px){
      .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .summary{grid-template-columns:repeat(2,minmax(0,1fr))}
      .studioCard{min-height:280px}
    }

    @media (max-width:680px){
      body{padding:12px}
      .page{min-height:calc(100svh - 24px)}
      .hero{flex-direction:column; align-items:stretch}
      .brand{flex-direction:column; align-items:stretch; gap:12px}
      .logoBox{width:100%}
      .clockBox{text-align:left; min-width:0}
      .headline{flex-direction:column; align-items:flex-start}
      .summary{grid-template-columns:repeat(2,minmax(0,1fr)); gap:10px}
      .grid{grid-template-columns:1fr}
      .studioCard{min-height:auto; padding:18px}
      .footer{flex-direction:column}
      .cardTop{align-items:flex-start}
      .badge{font-size:12px; padding:0 10px}
      .message{min-height:0}
    }

    body.tv{
      padding:clamp(18px,1.8vw,34px);
      overflow:hidden;
    }

    body.tv .page{
      width:100%;
      max-width:none;
      min-height:calc(100svh - clamp(36px,3.6vw,68px));
    }

    body.tv .titleBlock p{display:none}
    body.tv .summary{display:none}
    body.tv .headline{padding:16px 18px; margin-bottom:16px}
    body.tv .grid{grid-template-columns:repeat(4,minmax(0,1fr)); gap:18px; align-content:stretch}
    body.tv .studioCard{min-height:0; height:100%; padding:22px}
    body.tv .eventBox{padding:14px}
    body.tv .footer{font-size:15px}

    @media (min-width:1600px){
      body.tv .hero{margin-bottom:16px}
      body.tv .grid{gap:20px}
      body.tv .studioCard{padding:24px}
    }

    @media (max-width:1400px){
      body.tv{overflow:auto}
      body.tv .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      body.tv .studioCard{min-height:320px}
    }

    @media (max-height:790px) and (min-width:1401px){
      body.tv .hero{margin-bottom:10px}
      body.tv .headline{margin-bottom:10px; padding:12px 14px}
      body.tv .studioCard{padding:18px}
      body.tv .mainStatus{margin-top:14px}
      body.tv .events{margin-top:12px; gap:8px}
      body.tv .eventBox{padding:12px}
      body.tv .footer{margin-top:10px}
    }
  </style>
</head>

<body>
  <div class="page">
    <header class="hero">
      <div class="brand">
        <div class="logoBox" id="logoBox">
          <img src="ipam-logo.png" alt="Первая Академия Медиа" onerror="document.getElementById('logoBox').classList.add('noLogo')">
          <div class="logoFallback">ИПАМ</div>
        </div>

        <div class="titleBlock">
          <h1>Табло студий</h1>
          <p>Занятость аудиторий и студий в реальном времени</p>
        </div>
      </div>

      <div class="clockBox">
        <div class="time" id="clockTime">--:--</div>
        <div class="date" id="clockDate">--.--.----</div>
      </div>
    </header>

    <section class="headline">
      <div class="headlineMain">
        <span class="headlineDot" id="headlineDot"></span>
        <div>
          <div class="headlineTitle" id="headlineTitle">Загружаем данные...</div>
          <div class="headlineSub" id="headlineSub">Проверяем подключение к расписанию</div>
        </div>
      </div>

      <div class="refreshPill">
        <span class="refreshSpin"></span>
        <span id="refreshText">Обновление через: —</span>
      </div>
    </section>

    <section class="summary">
      <div class="summaryCard">
        <div class="summaryLabel">Свободно</div>
        <div class="summaryValue" id="freeCount">0</div>
      </div>
      <div class="summaryCard">
        <div class="summaryLabel">Занято</div>
        <div class="summaryValue" id="busyCount">0</div>
      </div>
      <div class="summaryCard">
        <div class="summaryLabel">Скоро занято</div>
        <div class="summaryValue" id="soonCount">0</div>
      </div>
      <div class="summaryCard">
        <div class="summaryLabel">Всего студий</div>
        <div class="summaryValue" id="totalCount">0</div>
      </div>
    </section>

    <main id="studiosGrid" class="grid">
      <div class="loading">Загружаем табло студий...</div>
    </main>

    <footer class="footer">
      <div class="statusLine" id="apiStatus">
        <span class="smallDot"></span>
        <span>Подключение к API...</span>
      </div>
      <div id="updatedAt">Последнее обновление: —</div>
    </footer>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxWe2wpLDw1VBY0tY7N-q28iL275sLONLrVo0qlbV_twDlJhB9NSoPmvZT5vUFs6K-CAA/exec?action=getStudiosStatus";
    const REFRESH_MS = 30000;
    const SOON_LIMIT_MINUTES = 30;

    const params = new URLSearchParams(window.location.search);
    if (params.get("tv") === "1") {
      document.body.classList.add("tv");
    }

    const studiosGrid = document.getElementById("studiosGrid");
    const apiStatus = document.getElementById("apiStatus");
    const updatedAtEl = document.getElementById("updatedAt");
    const refreshText = document.getElementById("refreshText");
    const headlineTitle = document.getElementById("headlineTitle");
    const headlineSub = document.getElementById("headlineSub");
    const headlineDot = document.getElementById("headlineDot");

    const freeCountEl = document.getElementById("freeCount");
    const busyCountEl = document.getElementById("busyCount");
    const soonCountEl = document.getElementById("soonCount");
    const totalCountEl = document.getElementById("totalCount");

    let secondsToRefresh = Math.floor(REFRESH_MS / 1000);
    let lastData = null;

    function escapeHtml(str){
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function updateLocalClock(){
      const now = new Date();
      const h = String(now.getHours()).padStart(2, "0");
      const m = String(now.getMinutes()).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      const mo = String(now.getMonth() + 1).padStart(2, "0");
      const y = now.getFullYear();

      document.getElementById("clockTime").textContent = `${h}:${m}`;
      document.getElementById("clockDate").textContent = `${d}.${mo}.${y}`;
    }

    function timeToMinutes(time){
      const match = String(time || "").trim().match(/^(\d{1,2}):(\d{2})$/);
      if (!match) return null;
      return Number(match[1]) * 60 + Number(match[2]);
    }

    function getNowMinutes(){
      const now = new Date();
      return now.getHours() * 60 + now.getMinutes();
    }

    function minutesText(diff){
      if (diff === null || diff === undefined || diff < 0) return "";
      if (diff === 0) return "меньше минуты";
      if (diff === 1) return "1 мин";
      return `${diff} мин`;
    }

    function getBusyLeftText(studio){
      if (!studio.current || !studio.current.end) return "";
      const end = timeToMinutes(studio.current.end);
      const now = getNowMinutes();
      if (end === null) return "";
      const diff = Math.max(0, end - now);
      return `Освободится через ${minutesText(diff)}`;
    }

    function getNextLeftText(next){
      if (!next || !next.start) return "";
      const start = timeToMinutes(next.start);
      const now = getNowMinutes();
      if (start === null) return "";
      const diff = start - now;
      if (diff <= 0) return "";
      return `Начало через ${minutesText(diff)}`;
    }

    function normalizeStatus(studio){
      const status = String(studio.status || "").toLowerCase();
      if (["busy", "free", "soon", "nodata"].includes(status)) return status;

      if (studio.current) return "busy";
      if (studio.next && studio.next.start) {
        const start = timeToMinutes(studio.next.start);
        const now = getNowMinutes();
        if (start !== null && start - now <= SOON_LIMIT_MINUTES && start - now > 0) return "soon";
      }
      return "free";
    }

    function statusTextByStatus(status, studio){
      if (studio.statusText) return studio.statusText;
      if (status === "busy") return "Занято";
      if (status === "soon") return "Скоро занято";
      if (status === "free") return "Свободно";
      return "Нет данных";
    }

    function eventHtml(item, label, isNext = false){
      if (!item) return "";

      const teacher = item.teacher ? `<div class="teacher">Преподаватель: ${escapeHtml(item.teacher)}</div>` : "";
      const comment = item.comment ? `<div class="commentBadge">${escapeHtml(item.comment)}</div>` : "";
      const leftText = isNext ? getNextLeftText(item) : "";
      const leftHtml = leftText ? `<div class="comment">${escapeHtml(leftText)}</div>` : "";
      const start = item.start || "—";
      const end = item.end || "—";

      return `
        <div class="eventBox ${isNext ? "next" : ""}">
          <div class="eventLabel">${escapeHtml(label)}</div>
          <div class="eventTime">${escapeHtml(start)}–${escapeHtml(end)}</div>
          <div class="eventName">${escapeHtml(item.event || "Занято")}</div>
          ${teacher}
          ${leftHtml}
          ${comment}
        </div>
      `;
    }

    function emptyHtml(text){
      return `<div class="emptyBox">${escapeHtml(text)}</div>`;
    }

    function statusMessage(studio){
      const status = normalizeStatus(studio);
      if (status === "busy") return studio.message || `Занято до ${studio.until || studio.current?.end || "—"}`;
      if (status === "soon") return studio.message || "Скоро начнётся занятие";
      if (status === "free") return studio.message || "Свободно сейчас";
      return studio.message || studio.statusText || "Нет данных";
    }

    function renderStudio(rawStudio){
      const studio = {...rawStudio};
      const cls = normalizeStatus(studio);
      const busyLeft = cls === "busy" ? getBusyLeftText(studio) : "";
      const currentEvent = studio.current ? eventHtml(studio.current, "Сейчас") : "";
      const nextEvent = studio.next ? eventHtml(studio.next, "Следующее занятие", true) : "";

      let body = "";
      if (currentEvent) body += currentEvent;
      if (nextEvent) body += nextEvent;
      if (!currentEvent && !nextEvent) {
        if (cls === "free") body += emptyHtml(studio.message || "Свободно сейчас. Ближайших занятий сегодня нет.");
        if (cls === "nodata") body += emptyHtml(studio.message || "Нет данных на сегодня");
        if (cls === "soon") body += emptyHtml(studio.message || "Скоро будет занято");
      }

      return `
        <article class="studioCard ${escapeHtml(cls)}">
          <div class="cardTop">
            <div class="room">${escapeHtml(studio.room || "Студия")}</div>
            <div class="badge">
              <span class="dot"></span>
              ${escapeHtml(statusTextByStatus(cls, studio))}
            </div>
          </div>

          <div class="mainStatus">
            <div class="statusText">${escapeHtml(statusMessage(studio))}</div>
            <div class="message">${escapeHtml(busyLeft || "")}</div>
          </div>

          <div class="events">${body}</div>
        </article>
      `;
    }

    function sortStudios(studios){
      const order = { busy: 1, soon: 2, free: 3, nodata: 4 };
      return [...studios].sort((a, b) => {
        const statusA = order[normalizeStatus(a)] || 9;
        const statusB = order[normalizeStatus(b)] || 9;
        if (statusA !== statusB) return statusA - statusB;
        return String(a.room || "").localeCompare(String(b.room || ""), "ru", { numeric: true });
      });
    }

    function getCounts(studios){
      return studios.reduce((acc, studio) => {
        const status = normalizeStatus(studio);
        acc.total += 1;
        if (status === "free") acc.free += 1;
        if (status === "busy") acc.busy += 1;
        if (status === "soon") acc.soon += 1;
        if (status === "nodata") acc.nodata += 1;
        return acc;
      }, {free:0, busy:0, soon:0, nodata:0, total:0});
    }

    function renderHeadline(studios){
      const counts = getCounts(studios);
      headlineTitle.textContent = `Свободно сейчас: ${counts.free} из ${counts.total}`;

      const parts = [];
      if (counts.busy) parts.push(`занято: ${counts.busy}`);
      if (counts.soon) parts.push(`скоро занято: ${counts.soon}`);
      if (counts.nodata) parts.push(`нет данных: ${counts.nodata}`);
      if (!counts.busy && !counts.soon && !counts.nodata && counts.total) parts.push("все доступные студии свободны");
      if (!counts.total) parts.push("данные по студиям не получены");

      headlineSub.textContent = parts.join(" · ");
      headlineDot.style.background = counts.free > 0 ? "var(--green)" : "var(--red)";
      headlineDot.style.boxShadow = counts.free > 0 ? "0 0 18px rgba(34,197,94,.55)" : "0 0 18px rgba(239,68,68,.55)";
    }

    function render(data){
      const studios = Array.isArray(data.studios) ? data.studios : [];
      const sorted = sortStudios(studios);
      const counts = getCounts(studios);

      freeCountEl.textContent = counts.free;
      busyCountEl.textContent = counts.busy;
      soonCountEl.textContent = counts.soon;
      totalCountEl.textContent = counts.total;

      renderHeadline(studios);
      studiosGrid.innerHTML = sorted.length ? sorted.map(renderStudio).join("") : `<div class="loading">Нет данных по студиям</div>`;

      apiStatus.classList.remove("error");
      apiStatus.querySelector("span:last-child").textContent = "API подключён";

      updatedAtEl.textContent = `Последнее обновление: ${data.currentTime || new Date().toLocaleTimeString("ru-RU", {hour:"2-digit", minute:"2-digit"})}`;
      lastData = data;
    }

    async function loadData(){
      try{
        const res = await fetch(API_URL, { cache: "no-store" });
        if (!res.ok) throw new Error(`Ошибка HTTP ${res.status}`);

        const data = await res.json();
        if (!data.ok) throw new Error(data.message || "Ошибка API");

        secondsToRefresh = Math.floor(REFRESH_MS / 1000);
        render(data);
      } catch(err){
        apiStatus.classList.add("error");
        apiStatus.querySelector("span:last-child").textContent = "Ошибка подключения API";
        updatedAtEl.textContent = err.message || "Ошибка загрузки";
        headlineTitle.textContent = "Ошибка подключения";
        headlineSub.textContent = "Проверьте Apps Script API и доступ к веб-приложению";
        headlineDot.style.background = "var(--red)";
        headlineDot.style.boxShadow = "0 0 18px rgba(239,68,68,.55)";

        if (!lastData) {
          studiosGrid.innerHTML = `<div class="loading">Не удалось загрузить данные. ${escapeHtml(err.message || "")}</div>`;
        }
      }
    }

    function tickRefresh(){
      secondsToRefresh = Math.max(0, secondsToRefresh - 1);
      refreshText.textContent = `Обновление через: ${secondsToRefresh} сек`;

      if (lastData) {
        renderHeadline(lastData.studios || []);
      }
    }

    updateLocalClock();
    setInterval(updateLocalClock, 1000);

    loadData();
    setInterval(loadData, REFRESH_MS);
    setInterval(tickRefresh, 1000);
  </script>
</body>
</html>
